# V1FS Helm chart values — single source of truth.
#
# Used by the bastion bootstrap (initial install) and scripts/upgrade.py
# (upgrades). Keep deviations from chart defaults minimal and documented:
# everything here is a documented chart option, so the deployment stays
# within TrendAI's supported methodology.
#
# NOT set here (supplied per-deploy via --set):
#   scanner.autoscaling.minReplicas / maxReplicas   (CloudFormation params)
#   endpoint exposure (values-nlb.yaml overlay, or ALB ingress --set values)

scanner:
  # Chart HPA DISABLED on this branch — the scanner is scaled by KEDA on SQS
  # queue depth (k8s/scanner-scaledobject.yaml) so the fleet size tracks the
  # backlog, not CPU. Two autoscalers on one Deployment fight, so this MUST
  # stay false: upgrade.py re-asserts it every upgrade and fails loudly if a
  # chart HPA reappears. NOTE: customer variant — NOT Trend's supported
  # (chart-HPA/CPU) autoscaling path.
  autoscaling:
    enabled: false
  # Shared scratch space across scanner pods on multiple nodes.
  ephemeralVolume:
    enabled: true
    storageClass: efs-sc
    accessMode: ReadWriteMany
    size: 100Gi
  # Chart default is enabled: true (inert without an ingress class).
  # Keep explicitly disabled — ALB mode re-enables it with its own settings.
  ingress:
    enabled: false

visiononeFilesecurity:
  management:
    dbEnabled: true

databaseContainer:
  storageClass:
    create: false        # use the CloudFormation-created gp3 StorageClass
  persistence:
    storageClassName: gp3
    size: 100Gi

managementService:
  # Chart default is enabled: true — never expose the management service.
  ingress:
    enabled: false
