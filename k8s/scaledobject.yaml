apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: sqs-trigger-auth
  namespace: visionone-filesecurity
spec:
  podIdentity:
    provider: aws
    identityOwner: keda
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: scanner-app-sqs-scaler
  namespace: visionone-filesecurity
spec:
  scaleTargetRef:
    name: scanner-app
    kind: Deployment
  minReplicaCount: 1
  maxReplicaCount: 150
  pollingInterval: 5
  cooldownPeriod: 90
  triggers:
    - type: aws-sqs-queue
      metadata:
        queueURL: "<SQS_QUEUE_URL>"
        queueLength: "5"
        awsRegion: "<AWS_REGION>"
        scaleOnInFlight: "true"
      authenticationRef:
        name: sqs-trigger-auth
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: v1fs-scanner-sqs-scaler
  namespace: visionone-filesecurity
spec:
  scaleTargetRef:
    name: my-release-visionone-filesecurity-scanner
    kind: Deployment
  minReplicaCount: 1
  maxReplicaCount: 150
  pollingInterval: 5
  cooldownPeriod: 90
  triggers:
    - type: aws-sqs-queue
      metadata:
        queueURL: "<SQS_QUEUE_URL>"
        queueLength: "50"
        awsRegion: "<AWS_REGION>"
        scaleOnInFlight: "true"
      authenticationRef:
        name: sqs-trigger-auth
