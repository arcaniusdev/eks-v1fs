# Reference template only — do NOT apply directly with kubectl.
# The deploy script (scripts/deploy.sh) generates the real ConfigMap
# with actual values substituted from CloudFormation stack outputs.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scanner-app-config
  namespace: visionone-filesecurity
data:
  SQS_QUEUE_URL: "<from FileScanQueueUrl output>"
  S3_INGEST_BUCKET: "<from IngestBucketName output>"
  S3_QUARANTINE_BUCKET: "<from QuarantineBucketName output>"
  S3_CLEAN_BUCKET: "<from CleanBucketName output>"
  S3_REVIEW_BUCKET: "<from ReviewBucketName output>"
  V1FS_SERVER_ADDR: "<V1FS_RELEASE_NAME>-visionone-filesecurity-scanner:50051"
  V1FS_API_KEY_SECRET_ARN: "<from ApiKeySecretArn output>"
  AWS_REGION: "us-east-1"
  LOG_LEVEL: "INFO"
  MAX_CONCURRENT_SCANS: "50"
  MAX_FILE_SIZE_MB: "500"
  TM_AM_SCAN_TIMEOUT_SECS: "600"
  PML_ENABLED: "false"
  AUDIT_LOG_GROUP: "<from ScanAuditLogGroupName output>"
  REVIEW_ROUTING_ENABLED: "true"
