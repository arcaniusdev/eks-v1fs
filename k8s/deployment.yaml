apiVersion: apps/v1
kind: Deployment
metadata:
  name: scanner-app
  namespace: visionone-filesecurity
spec:
  # replicas managed by KEDA ScaledObject (scanner-app-sqs-scaler)
  selector:
    matchLabels:
      app: scanner-app
  template:
    metadata:
      labels:
        app: scanner-app
    spec:
      serviceAccountName: scanner-app
      terminationGracePeriodSeconds: 300
      # Spread replicas across nodes so a single node loss / autoscaler
      # scale-down can't take out a large share of the fleet at once.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: scanner-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: scanner
          image: <ECR_REPO_URL>:<IMAGE_TAG>
          imagePullPolicy: Always
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: scanner-app-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            # Limit must hold one max-size file (MAX_FILE_SIZE_MB, default 500)
            # as bytes plus scan/gRPC overhead. The in-memory byte budget
            # (MAX_INFLIGHT_MB) keeps concurrent downloads under this ceiling.
            limits:
              memory: "2Gi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # CA cert for trusting a self-signed ALB scanner cert. optional:true
            # keeps the pod schedulable when the secret is absent (the default
            # ClusterIP/NLB plaintext path). Point V1FS_CA_CERT at the mounted
            # file to enable it. Read-only, compatible with readOnlyRootFilesystem.
            - name: scanner-tls-ca
              mountPath: /etc/v1fs-tls
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 10Mi
        - name: scanner-tls-ca
          secret:
            secretName: scanner-tls-ca
            optional: true
