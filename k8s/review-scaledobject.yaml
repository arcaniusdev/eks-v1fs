apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: sqs-trigger-auth
  namespace: visionone-review
spec:
  podIdentity:
    provider: aws
    identityOwner: keda
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: review-scanner-app-sqs-scaler
  namespace: visionone-review
spec:
  scaleTargetRef:
    name: review-scanner-app
    kind: Deployment
  minReplicaCount: 1
  maxReplicaCount: 5
  pollingInterval: 5
  cooldownPeriod: 300
  triggers:
    - type: aws-sqs-queue
      metadata:
        queueURL: "<SQS_QUEUE_URL>"
        queueLength: "50"
        awsRegion: "<AWS_REGION>"
        scaleOnInFlight: "true"
      authenticationRef:
        name: sqs-trigger-auth
# NOTE: KEDA scales ONLY our review-scanner-app deployment. The rv V1FS
# scanner (chart-owned) scales via the Helm chart's built-in HPA
# (scanner.autoscaling.enabled=true) — the Trend-supported mechanism.
