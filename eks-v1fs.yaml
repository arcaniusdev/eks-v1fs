            {"type":"log","x":0,"y":36,"width":12,"height":6,
              "properties":{"query":"SOURCE '${ScanAuditLogGroup}' | stats count(*) as scans by pod | sort scans desc | limit 20",
                "region":"${AWS::Region}","title":"Scans Per Pod","view":"bar"}},
            {"type":"log","x":12,"y":36,"width":12,"height":6,
              "properties":{"query":"SOURCE '${ScanAuditLogGroup}' | stats avg(size)/1024 as avg_kb, pct(size, 90)/1024 as p90_kb, max(size)/1024 as max_kb by bin(5m)",
                "region":"${AWS::Region}","title":"File Size (KB) \u2014 avg / p90 / max","view":"timeSeries"}},
            {"type":"text","x":0,"y":42,"width":24,"height":1,
              "properties":{"markdown":"## Recent Scans"}},
            {"type":"log","x":0,"y":43,"width":24,"height":6,
              "properties":{"query":"SOURCE '${ScanAuditLogGroup}' | fields @timestamp, file, verdict, malware.0 as malware_name, scanDurationMs as duration_ms, size, sha256, pod | sort @timestamp desc | limit 100",
                "region":"${AWS::Region}","title":"Latest Scan Results","view":"table"}}
          ]
        }

Outputs:
  ClusterName:
    Description: EKS cluster name
    Value: !Ref EKSCluster
  ClusterEndpoint:
    Description: EKS cluster API endpoint
    Value: !GetAtt EKSCluster.Endpoint
  BastionPublicIP:
    # Existing-VPC mode may place the bastion in a private subnet (no public IP)
    Condition: CreateNetwork
    Description: Bastion host public IP (informational — access is SSM-only)
    Value: !GetAtt Bastion.PublicIp
  BastionInstanceId:
    Description: Bastion instance ID for SSM Session Manager access
    Value: !Ref Bastion
  VPCId:
    Description: VPC ID
    Value: !If [CreateNetwork, !Ref BaseVPC, !Ref ExistingVpcId]
  PrivateSubnet1Id:
    Description: Private subnet 1
    Value: !If [CreateNetwork, !Ref PrivateSubnet1, !Ref ExistingPrivateSubnet1Id]
  PrivateSubnet2Id:
    Description: Private subnet 2
    Value: !If [CreateNetwork, !Ref PrivateSubnet2, !Ref ExistingPrivateSubnet2Id]
  NodeRoleArn:
    Description: EKS node instance role ARN
    Value: !GetAtt NodeInstanceRole.Arn
  RegistrationTokenSecretArn:
    Condition: HaveRegToken
    Description: Secrets Manager ARN for the V1FS registration token
    Value: !Ref V1FSRegistrationSecret
  ApiKeySecretArn:
    Description: Secrets Manager ARN for the V1FS API key
    Value: !Ref V1FSApiKeySecret
  BastionKeyPairId:
    Description: EC2 KeyPair ID (private key stored in SSM Parameter Store)
    Value: !GetAtt BastionKeyPair.KeyPairId
  BastionKeySSMParameter:
    Description: SSM Parameter Store path for the private key
    Value: !Sub /ec2/keypair/${BastionKeyPair.KeyPairId}
  IngestBucketName:
    Condition: ScannerAppEnabled
    Description: S3 bucket for incoming files to scan
    Value: !If [CreateIngestBucket, !Ref IngestBucket, !Ref ExistingIngestBucket]
  CleanBucketName:
    Condition: ScannerAppEnabled
    Description: S3 bucket for files that passed scanning
    Value: !Ref CleanBucket
  QuarantineBucketName:
    Condition: ScannerAppEnabled
    Description: S3 bucket for malicious files
    Value: !Ref QuarantineBucket
  ReviewBucketName:
    Condition: ReviewEnabled
    Description: S3 bucket for files requiring manual review (decompression limits exceeded)
    Value: !Ref ReviewBucket
  ReviewScanQueueUrl:
    Condition: ReviewEnabled
    Description: SQS queue URL for review bucket scan events
    Value: !Ref ReviewScanQueue
  ReviewScanDLQUrl:
    Condition: ReviewEnabled
    Description: SQS dead letter queue URL for failed review scans
    Value: !Ref ReviewScanDLQ
  ReviewAuditLogGroupName:
    Condition: ReviewEnabled
    Description: CloudWatch log group for review scan audit trail
    Value: !Ref ReviewAuditLogGroup
  FileScanQueueUrl:
    Condition: ScannerAppEnabled
    Description: SQS queue URL for S3 file events
    Value: !Ref FileScanQueue
  FileScanQueueArn:
    Condition: ScannerAppEnabled
    Description: SQS queue ARN for S3 file events
    Value: !GetAtt FileScanQueue.Arn
  FileScanDLQUrl:
    Condition: ScannerAppEnabled
    Description: SQS dead letter queue URL for failed processing
    Value: !Ref FileScanDLQ
  ScannerAppRoleArn:
    Condition: ScannerAppEnabled
    Description: IAM role ARN for the scanner app pod (via Pod Identity)
    Value: !GetAtt ScannerAppRole.Arn
  ECRRepoUrl:
    Condition: ScannerAppEnabled
    Description: ECR repository URL for the scanner app container image
    Value: !GetAtt ScannerAppECRRepo.RepositoryUri
  KedaOperatorRoleArn:
    Condition: ScannerAppEnabled
    Description: IAM role ARN for the KEDA operator (SQS metrics)
    Value: !GetAtt KedaOperatorRole.Arn
  ClusterAutoscalerRoleArn:
    Description: IAM role ARN for the Cluster Autoscaler
    Value: !GetAtt ClusterAutoscalerRole.Arn
  EFSFileSystemId:
    Description: EFS filesystem ID for scanner ephemeral volume
    Value: !Ref EFSFileSystem
  ScanAuditLogGroupName:
    Condition: ScannerAppEnabled
    Description: CloudWatch log group for scan audit trail
    Value: !Ref ScanAuditLogGroup
  AlarmSNSTopicArn:
    Condition: ScannerAppEnabled
    Description: SNS topic ARN for scan alarms (subscribe for notifications)
    Value: !Ref AlarmSNSTopic
  DashboardUrl:
    Condition: ScannerAppEnabled
    Description: CloudWatch dashboard URL for the scanner pipeline
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards/dashboard/scanner-${AWS::StackName}
  ScannerEndpointAddress:
    Condition: ExposeALB
    Description: gRPC endpoint address for external scanning applications (ALB, TLS on :443). Create a DNS record for ScannerDomain pointing at the ALB (see ScannerEndpointParameter for the ALB hostname).
    Value: !Sub "${ScannerDomain}:443"
  ScannerEndpointParameter:
    Condition: ExposeEndpoint
    Description: SSM parameter holding the scanner gRPC endpoint address (published by the bastion once the load balancer is provisioned)
    Value: !Sub /${AWS::StackName}/scanner-endpoint
  ScannerEndpointInstructions:
    Condition: ExposeEndpoint
    Description: How to connect an external scanning application
    Value: !If
      - ExposeNLB
      - !Sub >-
        Read the endpoint from SSM parameter /${AWS::StackName}/scanner-endpoint,
        then connect with the V1FS SDK from inside the VPC:
        amaas.grpc.init("<endpoint>", api_key, False) — plaintext gRPC on :50051 (VPC-internal NLB).
      - !Sub >-
        Create a DNS CNAME from ${ScannerDomain} to the ALB hostname (see SSM
        parameter /${AWS::StackName}/scanner-endpoint), then connect with TLS:
        amaas.grpc.init("${ScannerDomain}:443", api_key, True). If a self-signed
        cert was generated (SelfSignedScannerCert=true), fetch it from SSM
        /${AWS::StackName}/scanner-ca-cert and pass it as the SDK ca_cert:
        amaas.grpc.init("${ScannerDomain}:443", api_key, True, "/path/to/ca.crt").
