AWSTemplateFormatVersion: 2010-09-09
Description: >
  Deploy a hardened EKS cluster with Trend Micro Vision One File Security.

Parameters:
  PrimaryAZ:
    Description: Availability Zone 1
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1a
  SecondaryAZ:
    Description: Availability Zone 2
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1b
  RegistrationToken:
    Description: Vision One File Security registration token
    Type: String
    NoEcho: true
  ApiKey:
    Description: Vision One API key with "Run file scan via SDK" permission
    Type: String
    NoEcho: true
  DesiredCapacity:
    Type: Number
    Description: Desired number of system nodes in the managed node group (Karpenter handles workload scaling)
    Default: 3
    MinValue: 3
    MaxValue: 6
  PMLEnabled:
    Type: String
    Description: Enable Predictive Machine Learning (PML) for file scanning. Requires PML support on the Vision One account.
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  NodeInstanceType:
    Type: String
    Description: EC2 instance type for system node group (hosts CoreDNS, KEDA, Karpenter, CSI drivers). Scanner workloads run on Karpenter-provisioned xlarge nodes.
    Default: r7i.large
    AllowedValues:
      - r7i.large
      - r7i.xlarge
      - r7a.large
      - r7a.xlarge
      - r6i.large
      - r6i.xlarge

Mappings:
  RegionMap:
    us-east-1:
      ami: ami-0e1bed4f06a3b463d
    us-east-2:
      ami: ami-0884d2865dbe9de4b
    us-west-2:
      ami: ami-0606dd43116f5ed57

Resources:

  BaseVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.2.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub BaseVPC-${AWS::StackName}

  VPCFlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/vpc/flowlogs/${AWS::StackName}
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/vpc/flowlogs/${AWS::StackName}:*

  VPCFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /vpc/flowlogs/${AWS::StackName}
      RetentionInDays: 90

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref BaseVPC
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref VPCFlowLogGroup
      DeliverLogsPermissionArn: !GetAtt VPCFlowLogRole.Arn

  IG:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub IG-${AWS::StackName}

  VPCIG:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref IG
      VpcId: !Ref BaseVPC

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.0.0/22
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref PrimaryAZ
      Tags:
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: Name
          Value: !Sub PublicSubnet1-${AWS::StackName}

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.4.0/22
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref SecondaryAZ
      Tags:
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: Name
          Value: !Sub PublicSubnet2-${AWS::StackName}

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.32.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref PrimaryAZ
      Tags:
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: karpenter.sh/discovery
          Value: !Sub EKSCluster-${AWS::StackName}
        - Key: Name
          Value: !Sub PrivateSubnet1-${AWS::StackName}

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.48.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref SecondaryAZ
      Tags:
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: karpenter.sh/discovery
          Value: !Sub EKSCluster-${AWS::StackName}
        - Key: Name
          Value: !Sub PrivateSubnet2-${AWS::StackName}

  NGWEIP1:
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP1-${AWS::StackName}

  NGW1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP1.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub NGW1-${AWS::StackName}

  NGWEIP2:
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP2-${AWS::StackName}

  NGW2:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP2.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub NGW2-${AWS::StackName}

  PublicRT1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT1-${AWS::StackName}

  PublicRT2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT2-${AWS::StackName}

  PrivateRT1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT1-${AWS::StackName}

  PrivateRT2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT2-${AWS::StackName}

  PublicRoute1:
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT1
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PublicRoute2:
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT2
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW1

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW2

  PublicSubnetRT1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRT1
      SubnetId: !Ref PublicSubnet1

  PublicSubnetRT2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRT2
      SubnetId: !Ref PublicSubnet2

  PrivateSubnetRT1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRT1
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnetRT2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRT2
      SubnetId: !Ref PrivateSubnet2

  BastionSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: SSH access to bastion host from a single trusted CIDR
      Tags:
        - Key: Name
          Value: !Sub BastionSecGroup-${AWS::StackName}

  EKSSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: EKS control plane - restricted ports only
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.2.32.0/20
          Description: HTTPS API from private subnet 1
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.2.48.0/20
          Description: HTTPS API from private subnet 2
        - IpProtocol: tcp
          FromPort: 6443
          ToPort: 6443
          CidrIp: 10.2.32.0/20
          Description: K8s API from private subnet 1
        - IpProtocol: tcp
          FromPort: 6443
          ToPort: 6443
          CidrIp: 10.2.48.0/20
          Description: K8s API from private subnet 2
        - IpProtocol: tcp
          FromPort: 9443
          ToPort: 9443
          CidrIp: 10.2.32.0/20
          Description: Webhooks from private subnet 1
        - IpProtocol: tcp
          FromPort: 9443
          ToPort: 9443
          CidrIp: 10.2.48.0/20
          Description: Webhooks from private subnet 2
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref BastionSecGroup
          Description: HTTPS API from bastion
        - IpProtocol: tcp
          FromPort: 6443
          ToPort: 6443
          SourceSecurityGroupId: !Ref BastionSecGroup
          Description: K8s API from bastion
      Tags:
        - Key: Name
          Value: !Sub EKSSecGroup-${AWS::StackName}

  NodeSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: EKS worker nodes - restricted ports only
      Tags:
        - Key: karpenter.sh/discovery
          Value: !Sub EKSCluster-${AWS::StackName}
        - Key: Name
          Value: !Sub NodeSecGroup-${AWS::StackName}

  NodeSecGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecGroup
      IpProtocol: "-1"
      SourceSecurityGroupId: !Ref NodeSecGroup
      Description: Node-to-node (all protocols - pod networking, DNS, etc.)

  NodeSecGroupFromControlPlane:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecGroup
      IpProtocol: tcp
      FromPort: 1025
      ToPort: 65535
      SourceSecurityGroupId: !Ref EKSSecGroup
      Description: Control plane to node kubelet and workloads

  NodeSecGroupFromControlPlane443:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref EKSSecGroup
      Description: Control plane to node HTTPS (webhooks)

  NodeSecGroupBastionSSH:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      SourceSecurityGroupId: !Ref BastionSecGroup
      Description: SSH from bastion for debugging

  EKSSecGroupFromNodes:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EKSSecGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref NodeSecGroup
      Description: Nodes to control plane HTTPS

  EFSSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref BaseVPC
      GroupDescription: EFS mount targets - NFS access from EKS nodes
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref NodeSecGroup
          Description: NFS from EKS worker nodes
      Tags:
        - Key: Name
          Value: !Sub EFSSecGroup-${AWS::StackName}

  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub EKSClusterRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
      Tags:
        - Key: Name
          Value: !Sub EKSClusterRole-${AWS::StackName}

  NodeInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub EKSNodeRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: NodeCloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/eks/EKSCluster-${AWS::StackName}/*
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/containerinsights/EKSCluster-${AWS::StackName}/*
      Tags:
        - Key: Name
          Value: !Sub EKSNodeRole-${AWS::StackName}

  BastionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub BastionRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: BastionEKSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EKSAccess
                Effect: Allow
                Action:
                  - eks:DescribeCluster
                  - eks:ListClusters
                  - eks:AccessKubernetesApi
                Resource:
                  - !Sub arn:aws:eks:${AWS::Region}:${AWS::AccountId}:cluster/EKSCluster-${AWS::StackName}
              - Sid: ECRAuth
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: ECRRead
                Effect: Allow
                Action:
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchCheckLayerAvailability
                Resource: "*"
              - Sid: ECRPush
                Effect: Allow
                Action:
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                Resource: !GetAtt ScannerAppECRRepo.Arn
              - Sid: STS
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: CFNAccess
                Effect: Allow
                Action:
                  - cloudformation:SignalResource
                  - cloudformation:DescribeStacks
                Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*
              - Sid: SecretsManagerRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref V1FSRegistrationSecret
              - Sid: S3IngestWrite
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt IngestBucket.Arn
                  - !Sub ${IngestBucket.Arn}/*
      Tags:
        - Key: Name
          Value: !Sub BastionRole-${AWS::StackName}

  BastionInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BastionRole

  EBSCSIDriverRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub EBSCSIDriverRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
      Tags:
        - Key: Name
          Value: !Sub EBSCSIDriverRole-${AWS::StackName}

  EFSCSIDriverRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub EFSCSIDriverRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: EFSCSIDriverPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EFSAccess
                Effect: Allow
                Action:
                  - elasticfilesystem:DescribeAccessPoints
                  - elasticfilesystem:DescribeFileSystems
                  - elasticfilesystem:DescribeMountTargets
                  - elasticfilesystem:CreateAccessPoint
                  - elasticfilesystem:DeleteAccessPoint
                  - elasticfilesystem:TagResource
                Resource: "*"
              - Sid: EC2Describe
                Effect: Allow
                Action:
                  - ec2:DescribeAvailabilityZones
                Resource: "*"
      Tags:
        - Key: Name
          Value: !Sub EFSCSIDriverRole-${AWS::StackName}

  LBControllerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub LBControllerRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: AWSLoadBalancerControllerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:AWSServiceName: elasticloadbalancing.amazonaws.com
              - Effect: Allow
                Action:
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeAddresses
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeInternetGateways
                  - ec2:DescribeVpcs
                  - ec2:DescribeVpcPeeringConnections
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeInstances
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeTags
                  - ec2:DescribeCoipPools
                  - ec2:GetCoipPoolUsage
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeLoadBalancerAttributes
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeListenerCertificates
                  - elasticloadbalancing:DescribeSSLPolicies
                  - elasticloadbalancing:DescribeRules
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetGroupAttributes
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:DescribeTags
                  - elasticloadbalancing:DescribeTrustStores
                Resource: "*"
              - Effect: Allow
                Action:
                  - cognito-idp:DescribeUserPoolClient
                  - acm:ListCertificates
                  - acm:DescribeCertificate
                  - iam:ListServerCertificates
                  - iam:GetServerCertificate
                  - waf-regional:GetWebACL
                  - waf-regional:GetWebACLForResource
                  - waf-regional:AssociateWebACL
                  - waf-regional:DisassociateWebACL
                  - wafv2:GetWebACL
                  - wafv2:GetWebACLForResource
                  - wafv2:AssociateWebACL
                  - wafv2:DisassociateWebACL
                  - shield:GetSubscriptionState
                  - shield:DescribeProtection
                  - shield:CreateProtection
                  - shield:DeleteProtection
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:CreateSecurityGroup
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:CreateTags
                Resource: arn:aws:ec2:*:*:security-group/*
                Condition:
                  StringEquals:
                    ec2:CreateAction: CreateSecurityGroup
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: arn:aws:ec2:*:*:security-group/*
                Condition:
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "true"
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:DeleteSecurityGroup
                Resource: "*"
                Condition:
                  "Null":
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:CreateTargetGroup
                Resource: "*"
                Condition:
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:DeleteListener
                  - elasticloadbalancing:CreateRule
                  - elasticloadbalancing:DeleteRule
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:RemoveTags
                Resource:
                  - arn:aws:elasticloadbalancing:*:*:targetgroup/*/*
                  - arn:aws:elasticloadbalancing:*:*:loadbalancer/net/*/*
                  - arn:aws:elasticloadbalancing:*:*:loadbalancer/app/*/*
                Condition:
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "true"
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:RemoveTags
                Resource:
                  - arn:aws:elasticloadbalancing:*:*:listener/net/*/*/*
                  - arn:aws:elasticloadbalancing:*:*:listener/app/*/*/*
                  - arn:aws:elasticloadbalancing:*:*:listener-rule/net/*/*/*
                  - arn:aws:elasticloadbalancing:*:*:listener-rule/app/*/*/*
              - Effect: Allow
                Action:
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - elasticloadbalancing:SetIpAddressType
                  - elasticloadbalancing:SetSecurityGroups
                  - elasticloadbalancing:SetSubnets
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyTargetGroupAttributes
                  - elasticloadbalancing:DeleteTargetGroup
                Resource: "*"
                Condition:
                  "Null":
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                Resource: arn:aws:elasticloadbalancing:*:*:targetgroup/*/*
              - Effect: Allow
                Action:
                  - elasticloadbalancing:SetWebAcl
                  - elasticloadbalancing:ModifyListener
                  - elasticloadbalancing:AddListenerCertificates
                  - elasticloadbalancing:RemoveListenerCertificates
                  - elasticloadbalancing:ModifyRule
                Resource: "*"
      Tags:
        - Key: Name
          Value: !Sub LBControllerRole-${AWS::StackName}

  EKSCluster:
    DependsOn:
      - EKSClusterRole
      - EKSSecGroup
      - NGW1
      - NGW2
      - PrivateRoute1
      - PrivateRoute2
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub EKSCluster-${AWS::StackName}
      RoleArn: !GetAtt EKSClusterRole.Arn
      AccessConfig:
        AuthenticationMode: API_AND_CONFIG_MAP
      ResourcesVpcConfig:
        SecurityGroupIds:
          - !Ref EKSSecGroup
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        EndpointPrivateAccess: true
        EndpointPublicAccess: false
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
            - Type: controllerManager
            - Type: scheduler
      Tags:
        - Key: Name
          Value: !Sub EKSCluster-${AWS::StackName}

  BastionAccessEntry:
    DependsOn: EKSCluster
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      PrincipalArn: !GetAtt BastionRole.Arn
      Type: STANDARD
      AccessPolicies:
        - PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope:
            Type: cluster

  EKSLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub EKSLaunchTemplate-${AWS::StackName}
      LaunchTemplateData:
        MetadataOptions:
          HttpPutResponseHopLimit: 2
          HttpTokens: required
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 20
              VolumeType: gp3
              Encrypted: true
        SecurityGroupIds:
          - !Ref NodeSecGroup

  NodeGroup:
    DependsOn:
      - EKSCluster
      - NodeInstanceRole
      - EKSLaunchTemplate
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref EKSCluster
      LaunchTemplate:
        Id: !Ref EKSLaunchTemplate
        Version: !GetAtt EKSLaunchTemplate.LatestVersionNumber
      NodeRole: !GetAtt NodeInstanceRole.Arn
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      ScalingConfig:
        DesiredSize: !Ref DesiredCapacity
        MinSize: 3
        MaxSize: 6
      InstanceTypes:
        - !Ref NodeInstanceType

  CNIAddOn:
    DependsOn: EKSCluster
    Type: AWS::EKS::Addon
    Properties:
      AddonName: vpc-cni
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  PodIdentityAgentAddon:
    DependsOn: NodeGroup
    Type: AWS::EKS::Addon
    Properties:
      AddonName: eks-pod-identity-agent
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  CoreDNSAddon:
    DependsOn: NodeGroup
    Type: AWS::EKS::Addon
    Properties:
      AddonName: coredns
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  KubeProxyAddon:
    DependsOn: EKSCluster
    Type: AWS::EKS::Addon
    Properties:
      AddonName: kube-proxy
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  EBSCSIDriverAddon:
    DependsOn:
      - NodeGroup
      - EBSCSIDriverPodIdentity
    Type: AWS::EKS::Addon
    Properties:
      AddonName: aws-ebs-csi-driver
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  EBSCSIDriverPodIdentity:
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: kube-system
      ServiceAccount: ebs-csi-controller-sa
      RoleArn: !GetAtt EBSCSIDriverRole.Arn

  EFSCSIDriverAddon:
    DependsOn:
      - NodeGroup
      - EFSCSIDriverPodIdentity
    Type: AWS::EKS::Addon
    Properties:
      AddonName: aws-efs-csi-driver
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  EFSCSIDriverPodIdentity:
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: kube-system
      ServiceAccount: efs-csi-controller-sa
      RoleArn: !GetAtt EFSCSIDriverRole.Arn

  LBControllerPodIdentity:
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: kube-system
      ServiceAccount: aws-load-balancer-controller
      RoleArn: !GetAtt LBControllerRole.Arn

  KedaOperatorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub KedaOperatorRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: KedaSQSMetrics
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: SQSQueueMetrics
                Effect: Allow
                Action:
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                Resource: !GetAtt FileScanQueue.Arn
      Tags:
        - Key: Name
          Value: !Sub KedaOperatorRole-${AWS::StackName}

  KedaOperatorPodIdentity:
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: keda
      ServiceAccount: keda-operator
      RoleArn: !GetAtt KedaOperatorRole.Arn

  KarpenterControllerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub KarpenterControllerRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: KarpenterControllerPolicy
          PolicyDocument:
            Fn::Sub:
              - |
                {
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Sid": "AllowEC2Actions",
                      "Effect": "Allow",
                      "Action": [
                        "ec2:RunInstances",
                        "ec2:CreateFleet",
                        "ec2:CreateTags",
                        "ec2:TerminateInstances",
                        "ec2:DeleteLaunchTemplate",
                        "ec2:CreateLaunchTemplate",
                        "ec2:DescribeAvailabilityZones",
                        "ec2:DescribeImages",
                        "ec2:DescribeInstances",
                        "ec2:DescribeInstanceTypeOfferings",
                        "ec2:DescribeInstanceTypes",
                        "ec2:DescribeLaunchTemplates",
                        "ec2:DescribeSecurityGroups",
                        "ec2:DescribeSubnets",
                        "ec2:DescribeSpotPriceHistory"
                      ],
                      "Resource": "*",
                      "Condition": {
                        "StringEquals": {
                          "aws:RequestedRegion": "${AWS::Region}"
                        }
                      }
                    },
                    {
                      "Sid": "AllowSSMReadActions",
                      "Effect": "Allow",
                      "Action": "ssm:GetParameter",
                      "Resource": "arn:aws:ssm:${AWS::Region}::parameter/aws/service/*"
                    },
                    {
                      "Sid": "AllowPricingReadActions",
                      "Effect": "Allow",
                      "Action": "pricing:GetProducts",
                      "Resource": "*"
                    },
                    {
                      "Sid": "AllowPassingInstanceRole",
                      "Effect": "Allow",
                      "Action": "iam:PassRole",
                      "Resource": "${NodeRoleArn}",
                      "Condition": {
                        "StringEquals": {
                          "iam:PassedToService": "ec2.amazonaws.com"
                        }
                      }
                    },
                    {
                      "Sid": "AllowGetInstanceProfile",
                      "Effect": "Allow",
                      "Action": "iam:GetInstanceProfile",
                      "Resource": "*"
                    },
                    {
                      "Sid": "AllowEKSActions",
                      "Effect": "Allow",
                      "Action": "eks:DescribeCluster",
                      "Resource": "arn:aws:eks:${AWS::Region}:${AWS::AccountId}:cluster/${ClusterName}"
                    }
                  ]
                }
              - ClusterName: !Sub "EKSCluster-${AWS::StackName}"
                NodeRoleArn: !GetAtt NodeInstanceRole.Arn
      Tags:
        - Key: Name
          Value: !Sub KarpenterControllerRole-${AWS::StackName}

  KarpenterControllerPodIdentity:
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: kube-system
      ServiceAccount: karpenter
      RoleArn: !GetAtt KarpenterControllerRole.Arn

  KarpenterNodeAccessEntry:
    DependsOn: EKSCluster
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      PrincipalArn: !GetAtt NodeInstanceRole.Arn
      Type: EC2_LINUX

  KarpenterNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub KarpenterNodeProfile-${AWS::StackName}
      Roles:
        - !Ref NodeInstanceRole

  # --- Pre-Delete Cleanup (Lambda) ---
  # Ensures Karpenter-managed EC2 instances and orphaned EBS volumes
  # are cleaned up before CloudFormation deletes the EKS cluster and IAM roles.
  # Without this, stack deletion fails because orphaned resources still reference
  # the NodeInstanceRole.

  CleanupLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub CleanupLambdaRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CleanupPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:TerminateInstances
                  - ec2:DescribeVolumes
                  - ec2:DeleteVolume
                  - iam:ListInstanceProfiles
                  - iam:GetInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:DeleteInstanceProfile
                Resource: "*"

  CleanupLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub cleanup-${AWS::StackName}
      Runtime: python3.12
      Timeout: 300
      Handler: index.handler
      Role: !GetAtt CleanupLambdaRole.Arn
      Environment:
        Variables:
          CLUSTER_NAME: !Sub EKSCluster-${AWS::StackName}
          STACK_NAME: !Ref AWS::StackName
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import os
          import time

          def handler(event, context):
              if event['RequestType'] != 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              cluster_name = os.environ['CLUSTER_NAME']
              stack_name = os.environ['STACK_NAME']
              ec2 = boto3.client('ec2')
              iam = boto3.client('iam')

              try:
                  # 1. Terminate Karpenter-managed EC2 instances
                  print(f"Finding Karpenter instances for {cluster_name}...")
                  paginator = ec2.get_paginator('describe_instances')
                  instance_ids = []
                  for page in paginator.paginate(
                      Filters=[
                          {'Name': 'tag:karpenter.sh/nodepool', 'Values': ['*']},
                          {'Name': f'tag:kubernetes.io/cluster/{cluster_name}', 'Values': ['owned']},
                          {'Name': 'instance-state-name', 'Values': ['running', 'pending', 'stopping', 'stopped']},
                      ]
                  ):
                      for r in page['Reservations']:
                          for i in r['Instances']:
                              instance_ids.append(i['InstanceId'])

                  if instance_ids:
                      print(f"Terminating {len(instance_ids)} Karpenter instances...")
                      # Terminate in batches of 20
                      for i in range(0, len(instance_ids), 20):
                          batch = instance_ids[i:i+20]
                          ec2.terminate_instances(InstanceIds=batch)

                      # Wait for termination (up to 120s)
                      print("Waiting for instances to terminate...")
                      for _ in range(24):
                          time.sleep(5)
                          resp = ec2.describe_instances(InstanceIds=instance_ids)
                          states = [i['State']['Name'] for r in resp['Reservations'] for i in r['Instances']]
                          if all(s == 'terminated' for s in states):
                              print("All instances terminated")
                              break
                      else:
                          print("Warning: some instances still terminating after 120s")
                  else:
                      print("No Karpenter instances found")

                  # 2. Clean up orphaned instance profiles
                  print("Checking for Karpenter instance profiles...")
                  profiles = iam.list_instance_profiles()
                  for profile in profiles['InstanceProfiles']:
                      name = profile['InstanceProfileName']
                      if cluster_name in name and name != f'KarpenterNodeProfile-{stack_name}':
                          print(f"Cleaning up instance profile: {name}")
                          for role in profile['Roles']:
                              iam.remove_role_from_instance_profile(
                                  InstanceProfileName=name,
                                  RoleName=role['RoleName']
                              )
                          iam.delete_instance_profile(InstanceProfileName=name)

                  # 3. Delete orphaned EBS volumes (from V1FS PVCs)
                  print("Checking for orphaned EBS volumes...")
                  vols = ec2.describe_volumes(
                      Filters=[
                          {'Name': 'status', 'Values': ['available']},
                          {'Name': f'tag:kubernetes.io/cluster/{cluster_name}', 'Values': ['owned']},
                      ]
                  )
                  for vol in vols['Volumes']:
                      print(f"Deleting orphaned volume: {vol['VolumeId']}")
                      ec2.delete_volume(VolumeId=vol['VolumeId'])

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f"Cleanup error (non-fatal): {e}")
                  # Always succeed — don't block stack deletion
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

  CleanupTrigger:
    # DependsOn controls DELETE ordering (reverse of creation order).
    # By depending on NodeInstanceRole and KarpenterNodeInstanceProfile,
    # CloudFormation will delete this resource (running cleanup Lambda) BEFORE
    # attempting to delete the role and instance profile.
    DependsOn:
      - NodeInstanceRole
      - KarpenterNodeInstanceProfile
    Type: Custom::CleanupTrigger
    Properties:
      ServiceToken: !GetAtt CleanupLambda.Arn

  V1FSRegistrationSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}/v1fs-registration-token
      Description: Vision One File Security registration token
      SecretString: !Ref RegistrationToken
      Tags:
        - Key: Name
          Value: !Sub V1FSRegistrationToken-${AWS::StackName}

  V1FSApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}/v1fs-api-key
      Description: Vision One API key for SDK file scanning
      SecretString: !Ref ApiKey
      Tags:
        - Key: Name
          Value: !Sub V1FSApiKey-${AWS::StackName}

  BastionKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub BastionKey-${AWS::StackName}
      Tags:
        - Key: Name
          Value: !Sub BastionKey-${AWS::StackName}

  Bastion:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M
        Count: 1
    DependsOn:
      - LBControllerPodIdentity
      - EBSCSIDriverAddon
      - EFSCSIDriverAddon
      - EFSMountTarget1
      - EFSMountTarget2
    Properties:
      IamInstanceProfile: !Ref BastionInstanceProfile
      ImageId: !FindInMap
        - RegionMap
        - !Ref AWS::Region
        - ami
      InstanceType: t3.medium
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref PublicSubnet1
          GroupSet:
            - !Ref BastionSecGroup
          AssociatePublicIpAddress: true
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            Encrypted: true
      KeyName: !Ref BastionKeyPair
      AvailabilityZone: !Ref PrimaryAZ
      UserData: !Base64
        Fn::Sub: |
          #!/bin/bash -x
          # ------------------------------------------------------------------
          # Bastion provisioning script
          # Signals CloudFormation on exit regardless of success or failure.
          # No dependency on cfn-bootstrap / cfn-init / cfn-signal.
          # ------------------------------------------------------------------
          SIGNAL_STATUS="FAILURE"

          signal_cfn() {
            # Use whichever aws binary is available (v2 at /usr/local/bin, v1 at /usr/bin)
            AWS_CMD=$(command -v aws || echo "/usr/bin/aws")
            $AWS_CMD cloudformation signal-resource \
              --stack-name "${AWS::StackName}" \
              --logical-resource-id Bastion \
              --unique-id "$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || echo bastion)" \
              --status "$SIGNAL_STATUS" \
              --region "${AWS::Region}" || true
          }
          trap signal_cfn EXIT

          # Exit on first error — the trap will signal FAILURE.
          # Commands that are allowed to fail use || true explicitly.
          set -e

          export DEBIAN_FRONTEND=noninteractive
          export HOME=/root
          export PATH=/usr/local/bin:/usr/bin:/bin:/usr/local/sbin:/usr/sbin:/sbin:$PATH

          # Ensure /usr/local/bin is on PATH and KUBECONFIG is set for SSH sessions
          echo 'export PATH=/usr/local/bin:$PATH' > /etc/profile.d/local-bin.sh
          echo 'export KUBECONFIG=/root/.kube/config' >> /etc/profile.d/local-bin.sh
          chmod 644 /etc/profile.d/local-bin.sh

          # ---- System packages ----
          apt-get update -y
          apt-get remove needrestart -y || true
          apt-get install -y python3 python3-pip curl gpg apt-transport-https unzip jq

          # ---- AWS CLI v2 ----
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          /tmp/aws/install --update
          rm -rf /tmp/aws /tmp/awscliv2.zip
          /usr/local/bin/aws --version

          # ---- Helm ----
          curl -fsSL https://packages.buildkite.com/helm-linux/helm-debian/gpgkey | gpg --dearmor | tee /usr/share/keyrings/helm.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main" | tee /etc/apt/sources.list.d/helm-stable-debian.list
          apt-get update -y
          apt-get install -y helm
          helm version

          # ---- eksctl ----
          ARCH=amd64
          PLATFORM=$(uname -s)_$ARCH
          curl -sLO "https://github.com/eksctl-io/eksctl/releases/latest/download/eksctl_$PLATFORM.tar.gz"
          tar -xzf "eksctl_$PLATFORM.tar.gz" -C /tmp && rm "eksctl_$PLATFORM.tar.gz"
          mv /tmp/eksctl /usr/local/bin/eksctl
          /usr/local/bin/eksctl version

          # ---- kubectl ----
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          rm -f kubectl
          /usr/local/bin/kubectl version --client

          # ---- Configure kubeconfig ----
          /usr/local/bin/aws eks update-kubeconfig --region ${AWS::Region} --name EKSCluster-${AWS::StackName}
          export KUBECONFIG=/root/.kube/config

          # ---- Create V1FS namespace and secrets ----
          /usr/local/bin/kubectl create namespace visionone-filesecurity

          # Retrieve registration token from Secrets Manager into a temp file.
          # Using --from-file avoids shell interpolation issues with special
          # characters in the token (e.g. $, backticks, !, \).
          /usr/local/bin/aws secretsmanager get-secret-value \
            --secret-id "${V1FSRegistrationSecret}" \
            --query SecretString --output text \
            --region ${AWS::Region} | tr -d '\n' > /tmp/.reg-token
          /usr/local/bin/kubectl create secret generic token-secret \
            --from-file=registration-token=/tmp/.reg-token \
            -n visionone-filesecurity
          shred -u /tmp/.reg-token

          /usr/local/bin/kubectl create secret generic device-token-secret \
            -n visionone-filesecurity

          # ---- Install AWS Load Balancer Controller via Helm ----
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update eks
          helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=EKSCluster-${AWS::StackName} \
            --set vpcId=${BaseVPC} \
            --set region=${AWS::Region} \
            --wait --timeout 5m

          # ---- Install Metrics Server (cluster monitoring) ----
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
          kubectl rollout status deployment/metrics-server -n kube-system --timeout=120s

          # ---- Install Karpenter via Helm ----
          helm registry logout public.ecr.aws || true
          helm upgrade --install karpenter oci://public.ecr.aws/karpenter/karpenter \
            --version "1.3.0" \
            -n kube-system \
            --set "settings.clusterName=EKSCluster-${AWS::StackName}" \
            --set controller.resources.requests.cpu=500m \
            --set controller.resources.requests.memory=512Mi \
            --set controller.resources.limits.cpu=1 \
            --set controller.resources.limits.memory=1Gi \
            --wait --timeout 5m

          # ---- Apply Karpenter NodePool and EC2NodeClass ----
          cat <<EOFKARPENTER | kubectl apply -f -
          apiVersion: karpenter.k8s.aws/v1
          kind: EC2NodeClass
          metadata:
            name: scanner-nodes
          spec:
            instanceProfile: KarpenterNodeProfile-${AWS::StackName}
            amiSelectorTerms:
              - alias: al2023@latest
            subnetSelectorTerms:
              - tags:
                  karpenter.sh/discovery: EKSCluster-${AWS::StackName}
            securityGroupSelectorTerms:
              - tags:
                  karpenter.sh/discovery: EKSCluster-${AWS::StackName}
            blockDeviceMappings:
              - deviceName: /dev/xvda
                ebs:
                  volumeSize: 20Gi
                  volumeType: gp3
                  encrypted: true
            metadataOptions:
              httpEndpoint: enabled
              httpPutResponseHopLimit: 2
              httpTokens: required
          ---
          apiVersion: karpenter.sh/v1
          kind: NodePool
          metadata:
            name: scanner-pool
          spec:
            template:
              metadata:
                labels:
                  workload-type: scanner
              spec:
                nodeClassRef:
                  group: karpenter.k8s.aws
                  kind: EC2NodeClass
                  name: scanner-nodes
                requirements:
                  - key: kubernetes.io/arch
                    operator: In
                    values: ["amd64"]
                  - key: karpenter.sh/capacity-type
                    operator: In
                    values: ["on-demand"]
                  - key: node.kubernetes.io/instance-type
                    operator: In
                    values:
                      - r7i.xlarge
                      - r7a.xlarge
                      - r6i.xlarge
                expireAfter: 720h
            disruption:
              consolidationPolicy: WhenEmptyOrUnderutilized
              consolidateAfter: 2m
              budgets:
                - nodes: "10%"
            limits:
              cpu: 200
              memory: 1600Gi
            weight: 10
          EOFKARPENTER

          # ---- Install KEDA via Helm ----
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update kedacore
          helm install keda kedacore/keda \
            -n keda --create-namespace \
            --wait --timeout 5m

          # ---- Create gp3 StorageClass for V1FS database ----
          kubectl wait --for=condition=ready pod -l app=ebs-csi-controller -n kube-system --timeout=300s
          cat <<EOFGP3 | kubectl apply -f -
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: gp3
          provisioner: ebs.csi.aws.com
          parameters:
            type: gp3
            encrypted: "true"
          volumeBindingMode: WaitForFirstConsumer
          allowVolumeExpansion: true
          EOFGP3

          # ---- Create EFS StorageClass for V1FS scanner ephemeral volume ----
          kubectl wait --for=condition=ready pod -l app=efs-csi-controller -n kube-system --timeout=300s
          cat <<EOFSC | kubectl apply -f -
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: efs-sc
          provisioner: efs.csi.aws.com
          parameters:
            provisioningMode: efs-ap
            fileSystemId: ${EFSFileSystem}
            directoryPerms: "700"
            uid: "0"
            gid: "0"
            basePath: "/scanner"
          mountOptions:
            - tls
          EOFSC

          # ---- Install Vision One File Security via Helm (GPG-verified) ----
          helm repo add visionone-filesecurity https://trendmicro.github.io/visionone-file-security-helm/
          helm repo update
          curl -o /tmp/public-key.asc https://trendmicro.github.io/visionone-file-security-helm/public-key.asc
          gpg --import /tmp/public-key.asc
          gpg --export > /root/.gnupg/pubring.gpg

          # Verify chart signature (validation only - not used for install)
          helm pull --verify visionone-filesecurity/visionone-filesecurity

          # Install with scanner HPA enabled and increased resources for
          # high-throughput scanning (no --wait; pods need time to register
          # with Vision One cloud on first startup)
          helm install my-release visionone-filesecurity/visionone-filesecurity \
            -n visionone-filesecurity \
            --set scanner.autoscaling.enabled=false \
            --set scanner.resources.requests.cpu=800m \
            --set scanner.resources.requests.memory=2Gi \
            --set visiononeFilesecurity.management.dbEnabled=true \
            --set databaseContainer.storageClass.create=false \
            --set databaseContainer.persistence.storageClassName=gp3 \
            --set databaseContainer.persistence.size=100Gi \
            --set scanner.ephemeralVolume.enabled=true \
            --set scanner.ephemeralVolume.storageClass=efs-sc \
            --set scanner.ephemeralVolume.accessMode=ReadWriteMany \
            --set scanner.ephemeralVolume.size=100Gi

          # ---- Install Docker (needed to build scanner app image) ----
          apt-get install -y ca-certificates gnupg lsb-release
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
            | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
            https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" \
            > /etc/apt/sources.list.d/docker.list
          apt-get update -y
          apt-get install -y docker-ce docker-ce-cli containerd.io
          systemctl enable docker
          systemctl start docker

          # ---- Clone scanner app repo, build image, deploy to cluster ----
          export CFN_STACK_NAME="${AWS::StackName}"
          export AWS_REGION="${AWS::Region}"

          # Pass resource values directly — stack Outputs are not available during CREATE_IN_PROGRESS
          export ECR_REPO_URL="${ScannerAppECRRepo.RepositoryUri}"
          export SQS_QUEUE_URL="${FileScanQueue}"
          export S3_INGEST_BUCKET="${IngestBucket}"
          export S3_CLEAN_BUCKET="${CleanBucket}"
          export S3_QUARANTINE_BUCKET="${QuarantineBucket}"
          export V1FS_API_KEY_SECRET_ARN="${V1FSApiKeySecret}"
          export AUDIT_LOG_GROUP="scan-audit-${AWS::StackName}"
          export PML_ENABLED="${PMLEnabled}"

          git clone https://github.com/arcaniusdev/eks-v1fs.git /opt/eks-v1fs
          chmod +x /opt/eks-v1fs/scripts/*.sh

          /opt/eks-v1fs/scripts/build-and-push.sh
          /opt/eks-v1fs/scripts/deploy.sh

          # If we reach here, everything succeeded
          SIGNAL_STATUS="SUCCESS"
          echo "Bastion provisioning complete."
      Tags:
        - Key: Name
          Value: !Sub Bastion-${AWS::StackName}

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: elastic
      FileSystemTags:
        - Key: Name
          Value: !Sub EFS-${AWS::StackName}

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PrivateSubnet1
      SecurityGroups:
        - !Ref EFSSecGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PrivateSubnet2
      SecurityGroups:
        - !Ref EFSSecGroup

  ScannerAppECRRepo:
    Type: AWS::ECR::Repository
    Properties:
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      ImageTagMutability: IMMUTABLE
      EmptyOnDelete: true
      Tags:
        - Key: Name
          Value: !Sub ScannerAppECR-${AWS::StackName}

  IngestBucket:
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn: SQSQueuePolicy
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireUnprocessedFiles
            Status: Enabled
            ExpirationInDays: 7
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt FileScanQueue.Arn
      Tags:
        - Key: Name
          Value: !Sub IngestBucket-${AWS::StackName}
        - Key: Purpose
          Value: file-scan-ingest

  CleanBucket:
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub CleanBucket-${AWS::StackName}
        - Key: Purpose
          Value: file-scan-clean

  QuarantineBucket:
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub QuarantineBucket-${AWS::StackName}
        - Key: Purpose
          Value: file-scan-quarantine

  FileScanDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub file-scan-dlq-${AWS::StackName}
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Name
          Value: !Sub FileScanDLQ-${AWS::StackName}

  FileScanQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub file-scan-queue-${AWS::StackName}
      VisibilityTimeout: 600
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 20
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FileScanDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Name
          Value: !Sub FileScanQueue-${AWS::StackName}

  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref FileScanQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3Notification
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt FileScanQueue.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  ScannerAppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ScannerAppRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: ScannerAppPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: SQSPoll
                Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                Resource: !GetAtt FileScanQueue.Arn
              - Sid: S3IngestRead
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub ${IngestBucket.Arn}/*
              - Sid: S3CleanWrite
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectTagging
                Resource: !Sub ${CleanBucket.Arn}/*
              - Sid: S3QuarantineWrite
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectTagging
                Resource: !Sub ${QuarantineBucket.Arn}/*
              - Sid: SecretsManagerApiKey
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref V1FSApiKeySecret
              - Sid: CloudWatchAuditLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt ScanAuditLogGroup.Arn
      Tags:
        - Key: Name
          Value: !Sub ScannerAppRole-${AWS::StackName}

  ScannerAppPodIdentity:
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: visionone-filesecurity
      ServiceAccount: scanner-app
      RoleArn: !GetAtt ScannerAppRole.Arn

  # --- Monitoring & Observability ---

  ScanAuditLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub scan-audit-${AWS::StackName}
      RetentionInDays: 30
      Tags:
        - Key: Name
          Value: !Sub ScanAuditLogGroup-${AWS::StackName}

  AlarmSNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub scan-alarms-${AWS::StackName}
      Tags:
        - Key: Name
          Value: !Sub AlarmSNSTopic-${AWS::StackName}

  DLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub DLQ-Messages-${AWS::StackName}
      AlarmDescription: Messages in the dead-letter queue indicate scan failures after 3 retries
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt FileScanDLQ.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

  QueueAgeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub Queue-Age-${AWS::StackName}
      AlarmDescription: Oldest message age exceeds 5 minutes — scanners may be falling behind
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
        - Name: QueueName
          Value: !GetAtt FileScanQueue.QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 3
      Threshold: 300
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

  # --- DLQ Remediation ---

  DLQRemediationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub DLQRemediationRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DLQRemediationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DLQRead
                Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt FileScanDLQ.Arn
              - Sid: MainQueueWrite
                Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt FileScanQueue.Arn

  DLQRemediationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub dlq-remediation-${AWS::StackName}
      Runtime: python3.12
      Timeout: 60
      Handler: index.handler
      Role: !GetAtt DLQRemediationRole.Arn
      Environment:
        Variables:
          QUEUE_URL: !Ref FileScanQueue
          MAX_DLQ_RETRIES: "3"
      Code:
        ZipFile: |
          import boto3
          import json
          import os

          sqs = boto3.client('sqs')
          QUEUE_URL = os.environ['QUEUE_URL']
          MAX_RETRIES = int(os.environ.get('MAX_DLQ_RETRIES', '3'))

          def handler(event, context):
              for record in event['Records']:
                  msg_id = record['messageId']
                  body = record['body']
                  attrs = record.get('messageAttributes', {})

                  retry = 0
                  if 'DLQRetryCount' in attrs:
                      retry = int(attrs['DLQRetryCount']['stringValue'])

                  if retry >= MAX_RETRIES:
                      print(f"PERMANENT_FAILURE: message {msg_id} exceeded {MAX_RETRIES} DLQ retries, discarding")
                      try:
                          parsed = json.loads(body)
                          for r in parsed.get('Records', []):
                              s3info = r.get('s3', {})
                              print(f"  file: s3://{s3info.get('bucket',{}).get('name','?')}/{s3info.get('object',{}).get('key','?')}")
                      except Exception:
                          pass
                      continue

                  retry += 1
                  delay = min(60 * (5 ** (retry - 1)), 900)
                  print(f"RE-QUEUE: message {msg_id} DLQ retry {retry}/{MAX_RETRIES} delay={delay}s")

                  sqs.send_message(
                      QueueUrl=QUEUE_URL,
                      MessageBody=body,
                      DelaySeconds=delay,
                      MessageAttributes={
                          'DLQRetryCount': {
                              'DataType': 'Number',
                              'StringValue': str(retry),
                          }
                      },
                  )

  DLQEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt FileScanDLQ.Arn
      FunctionName: !Ref DLQRemediationLambda
      BatchSize: 10
      Enabled: true

  # --- Dashboard ---

  ScannerDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub scanner-${AWS::StackName}
      DashboardBody: !Sub |
        {
          "widgets": [
            {"type":"text","x":0,"y":0,"width":24,"height":1,
              "properties":{"markdown":"# Scanner Pipeline \u2014 ${AWS::StackName}"}},
            {"type":"alarm","x":0,"y":1,"width":6,"height":3,
              "properties":{"title":"Alarm Status","alarms":[
                "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:DLQ-Messages-${AWS::StackName}",
                "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:Queue-Age-${AWS::StackName}"
              ]}},
            {"type":"metric","x":6,"y":1,"width":3,"height":3,
              "properties":{"metrics":[["AWS/SQS","NumberOfMessagesDeleted","QueueName","${FileScanQueue.QueueName}",{"stat":"Sum","color":"#2ca02c"}]],
                "view":"singleValue","region":"${AWS::Region}","title":"Scans (1h)","period":3600,"sparkline":true}},
            {"type":"metric","x":9,"y":1,"width":3,"height":3,
              "properties":{"metrics":[["AWS/SQS","NumberOfMessagesDeleted","QueueName","${FileScanQueue.QueueName}",{"stat":"Sum","color":"#1f77b4","label":"/min"}]],
                "view":"singleValue","region":"${AWS::Region}","title":"Scan Rate","period":60,"sparkline":true}},
            {"type":"metric","x":12,"y":1,"width":3,"height":3,
              "properties":{"metrics":[["AWS/SQS","ApproximateAgeOfOldestMessage","QueueName","${FileScanQueue.QueueName}",{"stat":"Maximum","color":"#ff7f0e"}]],
                "view":"singleValue","region":"${AWS::Region}","title":"Queue Age (s)","period":60,"sparkline":true}},
            {"type":"metric","x":15,"y":1,"width":3,"height":3,
              "properties":{"metrics":[["AWS/SQS","ApproximateNumberOfMessagesVisible","QueueName","${FileScanQueue.QueueName}",{"stat":"Maximum","color":"#1f77b4"}]],
                "view":"singleValue","region":"${AWS::Region}","title":"Queued","period":60,"sparkline":true}},
            {"type":"metric","x":18,"y":1,"width":3,"height":3,
              "properties":{"metrics":[["AWS/SQS","ApproximateNumberOfMessagesNotVisible","QueueName","${FileScanQueue.QueueName}",{"stat":"Maximum","color":"#9467bd"}]],
                "view":"singleValue","region":"${AWS::Region}","title":"In Flight","period":60,"sparkline":true}},
            {"type":"metric","x":21,"y":1,"width":3,"height":3,
              "properties":{"metrics":[["AWS/SQS","ApproximateNumberOfMessagesVisible","QueueName","${FileScanDLQ.QueueName}",{"stat":"Maximum","color":"#d62728"}]],
                "view":"singleValue","region":"${AWS::Region}","title":"DLQ","period":60,"sparkline":true}},
            {"type":"text","x":0,"y":4,"width":24,"height":1,
              "properties":{"markdown":"## Queue Health"}},
            {"type":"metric","x":0,"y":5,"width":12,"height":6,
              "properties":{"metrics":[
                  ["AWS/SQS","NumberOfMessagesSent","QueueName","${FileScanQueue.QueueName}",{"stat":"Sum","color":"#1f77b4","label":"Sent (ingested)"}],
                  ["AWS/SQS","NumberOfMessagesReceived","QueueName","${FileScanQueue.QueueName}",{"stat":"Sum","color":"#ff7f0e","label":"Received (picked up)"}],
                  ["AWS/SQS","NumberOfMessagesDeleted","QueueName","${FileScanQueue.QueueName}",{"stat":"Sum","color":"#2ca02c","label":"Deleted (completed)"}]],
                "view":"timeSeries","stacked":false,"region":"${AWS::Region}","title":"Message Flow","period":60,
                "yAxis":{"left":{"label":"Messages","showUnits":false}}}},
            {"type":"metric","x":12,"y":5,"width":12,"height":6,
              "properties":{"metrics":[
                  ["AWS/SQS","ApproximateNumberOfMessagesVisible","QueueName","${FileScanQueue.QueueName}",{"stat":"Maximum","color":"#1f77b4","label":"Visible"}],
                  ["AWS/SQS","ApproximateNumberOfMessagesNotVisible","QueueName","${FileScanQueue.QueueName}",{"stat":"Maximum","color":"#9467bd","label":"In Flight"}],
                  ["AWS/SQS","ApproximateAgeOfOldestMessage","QueueName","${FileScanQueue.QueueName}",{"stat":"Maximum","color":"#d62728","label":"Age (s)","yAxis":"right"}]],
                "view":"timeSeries","stacked":false,"region":"${AWS::Region}","title":"Queue Depth & Message Age","period":60,
                "yAxis":{"left":{"label":"Messages","showUnits":false},"right":{"label":"Seconds","showUnits":false}}}},
            {"type":"text","x":0,"y":11,"width":24,"height":1,
              "properties":{"markdown":"## Scan Performance"}},
            {"type":"log","x":0,"y":12,"width":12,"height":6,
              "properties":{"query":"SOURCE '${ScanAuditLogGroup}' | stats count(*) as scans by bin(1m)",
                "region":"${AWS::Region}","title":"Throughput (scans/min)","view":"timeSeries"}},
            {"type":"log","x":12,"y":12,"width":12,"height":6,
              "properties":{"query":"SOURCE '${ScanAuditLogGroup}' | filter scanDurationMs > 0 | stats avg(scanDurationMs) as avg_ms, pct(scanDurationMs, 50) as p50, pct(scanDurationMs, 90) as p90, pct(scanDurationMs, 99) as p99 by bin(5m)",
                "region":"${AWS::Region}","title":"Scan Duration (ms) \u2014 avg / p50 / p90 / p99","view":"timeSeries"}},
            {"type":"text","x":0,"y":18,"width":24,"height":1,
              "properties":{"markdown":"## Detection Analysis"}},
            {"type":"log","x":0,"y":19,"width":8,"height":6,
              "properties":{"query":"SOURCE '${ScanAuditLogGroup}' | stats count(*) as total by verdict",
                "region":"${AWS::Region}","title":"Verdict Breakdown","view":"pie"}},
            {"type":"log","x":8,"y":19,"width":8,"height":6,
              "properties":{"query":"SOURCE '${ScanAuditLogGroup}' | filter verdict = 'malicious' | stats count(*) as detections by bin(5m)",
                "region":"${AWS::Region}","title":"Malicious Detections Over Time","view":"timeSeries"}},
            {"type":"log","x":16,"y":19,"width":8,"height":6,
              "properties":{"query":"SOURCE '${ScanAuditLogGroup}' | filter verdict = 'malicious' | stats count(*) as detections by malware.0 as malware_name | sort detections desc | limit 10",
                "region":"${AWS::Region}","title":"Top Malware Names","view":"table"}},
            {"type":"text","x":0,"y":25,"width":24,"height":1,
              "properties":{"markdown":"## DLQ & Remediation"}},
            {"type":"metric","x":0,"y":26,"width":8,"height":6,
              "properties":{"metrics":[
                  ["AWS/SQS","ApproximateNumberOfMessagesVisible","QueueName","${FileScanDLQ.QueueName}",{"stat":"Maximum","color":"#d62728","label":"DLQ Depth"}],
                  ["AWS/SQS","NumberOfMessagesSent","QueueName","${FileScanDLQ.QueueName}",{"stat":"Sum","color":"#ff7f0e","label":"Messages Arriving"}]],
                "view":"timeSeries","stacked":false,"region":"${AWS::Region}","title":"Dead Letter Queue","period":60,
                "yAxis":{"left":{"label":"Messages","showUnits":false}}}},
            {"type":"metric","x":8,"y":26,"width":8,"height":6,
              "properties":{"metrics":[
                  ["AWS/Lambda","Invocations","FunctionName","${DLQRemediationLambda}",{"stat":"Sum","color":"#1f77b4","label":"Invocations"}],
                  ["AWS/Lambda","Errors","FunctionName","${DLQRemediationLambda}",{"stat":"Sum","color":"#d62728","label":"Errors"}]],
                "view":"timeSeries","stacked":false,"region":"${AWS::Region}","title":"DLQ Remediation Lambda","period":60,
                "yAxis":{"left":{"label":"Count","showUnits":false}}}},
            {"type":"metric","x":16,"y":26,"width":8,"height":6,
              "properties":{"metrics":[
                  ["AWS/Lambda","Duration","FunctionName","${DLQRemediationLambda}",{"stat":"Average","color":"#9467bd","label":"Avg"}],
                  ["AWS/Lambda","Duration","FunctionName","${DLQRemediationLambda}",{"stat":"Maximum","color":"#d62728","label":"Max"}]],
                "view":"timeSeries","stacked":false,"region":"${AWS::Region}","title":"Lambda Duration (ms)","period":60,
                "yAxis":{"left":{"label":"ms","showUnits":false}}}},
            {"type":"text","x":0,"y":32,"width":24,"height":1,
              "properties":{"markdown":"## Pod & File Distribution"}},
            {"type":"log","x":0,"y":33,"width":12,"height":6,
              "properties":{"query":"SOURCE '${ScanAuditLogGroup}' | stats count(*) as scans by pod | sort scans desc | limit 20",
                "region":"${AWS::Region}","title":"Scans Per Pod","view":"bar"}},
            {"type":"log","x":12,"y":33,"width":12,"height":6,
              "properties":{"query":"SOURCE '${ScanAuditLogGroup}' | stats avg(size)/1024 as avg_kb, pct(size, 90)/1024 as p90_kb, max(size)/1024 as max_kb by bin(5m)",
                "region":"${AWS::Region}","title":"File Size (KB) \u2014 avg / p90 / max","view":"timeSeries"}},
            {"type":"text","x":0,"y":39,"width":24,"height":1,
              "properties":{"markdown":"## Recent Scans"}},
            {"type":"log","x":0,"y":40,"width":24,"height":6,
              "properties":{"query":"SOURCE '${ScanAuditLogGroup}' | fields @timestamp, file, verdict, scanDurationMs as duration_ms, size, sha256, pod | sort @timestamp desc | limit 50",
                "region":"${AWS::Region}","title":"Latest Scan Results","view":"table"}}
          ]
        }

Outputs:
  ClusterName:
    Description: EKS cluster name
    Value: !Ref EKSCluster
  ClusterEndpoint:
    Description: EKS cluster API endpoint
    Value: !GetAtt EKSCluster.Endpoint
  BastionPublicIP:
    Description: Bastion host public IP
    Value: !GetAtt Bastion.PublicIp
  VPCId:
    Description: VPC ID
    Value: !Ref BaseVPC
  PrivateSubnet1Id:
    Description: Private subnet 1
    Value: !Ref PrivateSubnet1
  PrivateSubnet2Id:
    Description: Private subnet 2
    Value: !Ref PrivateSubnet2
  NodeRoleArn:
    Description: EKS node instance role ARN
    Value: !GetAtt NodeInstanceRole.Arn
  RegistrationTokenSecretArn:
    Description: Secrets Manager ARN for the V1FS registration token
    Value: !Ref V1FSRegistrationSecret
  ApiKeySecretArn:
    Description: Secrets Manager ARN for the V1FS API key
    Value: !Ref V1FSApiKeySecret
  BastionKeyPairId:
    Description: EC2 KeyPair ID (private key stored in SSM Parameter Store)
    Value: !GetAtt BastionKeyPair.KeyPairId
  BastionKeySSMParameter:
    Description: SSM Parameter Store path for the private key
    Value: !Sub /ec2/keypair/${BastionKeyPair.KeyPairId}
  IngestBucketName:
    Description: S3 bucket for incoming files to scan
    Value: !Ref IngestBucket
  CleanBucketName:
    Description: S3 bucket for files that passed scanning
    Value: !Ref CleanBucket
  QuarantineBucketName:
    Description: S3 bucket for malicious files
    Value: !Ref QuarantineBucket
  FileScanQueueUrl:
    Description: SQS queue URL for S3 file events
    Value: !Ref FileScanQueue
  FileScanQueueArn:
    Description: SQS queue ARN for S3 file events
    Value: !GetAtt FileScanQueue.Arn
  FileScanDLQUrl:
    Description: SQS dead letter queue URL for failed processing
    Value: !Ref FileScanDLQ
  ScannerAppRoleArn:
    Description: IAM role ARN for the scanner app pod (via Pod Identity)
    Value: !GetAtt ScannerAppRole.Arn
  ECRRepoUrl:
    Description: ECR repository URL for the scanner app container image
    Value: !GetAtt ScannerAppECRRepo.RepositoryUri
  KedaOperatorRoleArn:
    Description: IAM role ARN for the KEDA operator (SQS metrics)
    Value: !GetAtt KedaOperatorRole.Arn
  KarpenterControllerRoleArn:
    Description: IAM role ARN for the Karpenter controller
    Value: !GetAtt KarpenterControllerRole.Arn
  EFSFileSystemId:
    Description: EFS filesystem ID for scanner ephemeral volume
    Value: !Ref EFSFileSystem
  ScanAuditLogGroupName:
    Description: CloudWatch log group for scan audit trail
    Value: !Ref ScanAuditLogGroup
  AlarmSNSTopicArn:
    Description: SNS topic ARN for scan alarms (subscribe for notifications)
    Value: !Ref AlarmSNSTopic
