AWSTemplateFormatVersion: 2010-09-09
Description: >
  Deploy a hardened EKS cluster with Trend Micro Vision One File Security.

Parameters:
  RepoRef:
    Description: >
      Git ref (tag or branch) of the eks-v1fs repository the bastion clones for
      app code, k8s manifests, and helm values. Defaults to the release tag that
      matches this template, so the deployed components always match the template
      you launched. Override with a branch name (e.g. main) only for development.
    Type: String
    Default: v1.0.2
  PrimaryAZ:
    Description: Availability Zone 1 (ignored when deploying into an existing VPC)
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1a
  SecondaryAZ:
    Description: Availability Zone 2 (ignored when deploying into an existing VPC)
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-east-1b
  ExistingVpcId:
    Description: >
      Deploy into an EXISTING VPC instead of creating one (leave empty to create).
      Requirements: DNS support and DNS hostnames enabled; two private subnets in
      different AZs with outbound internet (NAT or proxy — the scanner must reach
      Vision One for registration and updates) and the kubernetes.io/role/internal-elb=1
      tag; one subnet for the bastion host (private is fine — access is SSM-only).
      When set, ExistingVpcCidr and all three subnet parameters are required.
    Type: String
    Default: ""
    AllowedPattern: "^$|^vpc-[a-f0-9]{8,17}$"
  ExistingVpcCidr:
    Description: CIDR block of the existing VPC (e.g. 10.0.0.0/16) — used for scanner endpoint security group rules
    Type: String
    Default: ""
    AllowedPattern: "^$|^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
  ExistingPrivateSubnet1Id:
    Description: First private subnet in the existing VPC (EKS nodes, EFS)
    Type: String
    Default: ""
    AllowedPattern: "^$|^subnet-[a-f0-9]{8,17}$"
  ExistingPrivateSubnet2Id:
    Description: Second private subnet in the existing VPC, in a different AZ
    Type: String
    Default: ""
    AllowedPattern: "^$|^subnet-[a-f0-9]{8,17}$"
  ExistingBastionSubnetId:
    Description: Subnet for the bastion host in the existing VPC (private is fine — bastion is SSM-only and needs only outbound internet)
    Type: String
    Default: ""
    AllowedPattern: "^$|^subnet-[a-f0-9]{8,17}$"
  RegistrationToken:
    Description: >
      Vision One File Security registration token. LEAVE EMPTY to auto-fetch
      one at deploy time using the ApiKey (POST /beta/fileSecurity/ctr/registration).
      Provide explicitly only if your API key cannot mint registration tokens.
    Type: String
    NoEcho: true
    Default: ""
  ApiKey:
    Description: Vision One API key with "Run file scan via SDK" permission (also used to auto-fetch the registration token when RegistrationToken is empty)
    Type: String
    NoEcho: true
  VisionOneApiEndpoint:
    Description: Vision One API endpoint for your tenant region (used for registration-token auto-fetch)
    Type: String
    Default: https://api.xdr.trendmicro.com
  NodeGroupMinSize:
    Type: Number
    Description: Minimum nodes in the managed node group (min 2 for CoreDNS/AZ redundancy)
    Default: 2
    MinValue: 1
    MaxValue: 20
  NodeGroupDesiredSize:
    Type: Number
    Description: Initial desired nodes in the managed node group (Cluster Autoscaler adjusts from here)
    Default: 2
    MinValue: 1
    MaxValue: 20
  NodeGroupMaxSize:
    Type: Number
    Description: >
      Maximum nodes the Cluster Autoscaler may scale the managed node group to.
      Default 8 fits full-mode peak (10 V1FS scanners + 20 scanner-app pods +
      review pipeline + system pods) on r7i.xlarge nodes.
    Default: 8
    MinValue: 1
    MaxValue: 30
  ScannerMinReplicas:
    Type: Number
    Description: Minimum V1FS scanner pods (chart HPA minReplicas)
    Default: 1
    MinValue: 1
    MaxValue: 20
  ScannerMaxReplicas:
    Type: Number
    Description: Maximum V1FS scanner pods (chart HPA maxReplicas, CPU/memory 80% targets)
    Default: 10
    MinValue: 1
    MaxValue: 50
  DeployScannerApp:
    Type: String
    Description: >
      Deploy the S3/SQS scanning application (buckets, queues, scanner-app pods).
      Set to false if you have your own scanning application — the stack then
      deploys only the V1FS scanner and publishes its gRPC endpoint address.
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  ScannerAppMaxReplicas:
    Type: Number
    Description: Maximum scanner-app pods (KEDA SQS-driven scaling)
    Default: 20
    MinValue: 1
    MaxValue: 100
  DeployReviewPipeline:
    Type: String
    Description: >
      Deploy the review pipeline (second V1FS release with unlimited decompression
      for deep archive analysis). Requires DeployScannerApp=true. When false,
      files exceeding decompression limits are quarantined with an explanatory tag.
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  ExistingIngestBucket:
    Type: String
    Description: >
      Name of an EXISTING S3 bucket to scan (leave empty to create a new ingest
      bucket). Existing buckets are wired via S3 -> EventBridge -> SQS so your
      current bucket notification configuration is preserved, and scanned objects
      are tagged with the verdict instead of being deleted from the bucket.
    Default: ""
    AllowedPattern: "^$|^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$"
  ScannerEndpointMode:
    Type: String
    Description: >
      How to expose the V1FS scanner gRPC endpoint for external scanning
      applications. auto (default) = internal NLB (L4) for BOTH full-auto and
      BYO. The NLB is VPC-reachable (gRPC :50051, ICAP :1344) AND doubles as a
      pod-discovery registry: with target-type=ip its target group tracks the
      live scanner pod IPs, which a client-side dispatcher reads via the ELB
      DescribeTargetHealth API to connect directly to pods (pull/semaphore
      balancing, NLB out of the scan path). nlb = same as auto (explicit);
      alb = ALB Ingress with TLS (L7, per-request gRPC balancing) — opt-in,
      needs ScannerDomain (defaulted) plus a cert (SelfSignedScannerCert
      defaults true); none = in-cluster only.
    Default: "auto"
    AllowedValues:
      - "auto"
      - "none"
      - "nlb"
      - "alb"
  ACMCertificateArn:
    Type: String
    Description: ACM certificate ARN for the scanner ALB (ScannerEndpointMode=alb). Leave empty to auto-generate one via SelfSignedScannerCert.
    Default: ""
  SelfSignedScannerCert:
    Type: String
    Description: >
      When ScannerEndpointMode=alb and no ACMCertificateArn is supplied, the
      bastion generates a self-signed cert for ScannerDomain, imports it to ACM
      for the ALB listener, and stores it in a Secret so gRPC clients can trust
      it (SDK ca_cert). Removes the need to bring a publicly-signed certificate.
      Default true so BYO ALB mode is no-touch; set false to require your own ACM cert.
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
  ScannerDomain:
    Type: String
    Description: >
      DNS name clients use to reach the scanner ALB and the SAN of the
      self-signed cert. Override with your own name when you set up a real DNS
      record; the default works out-of-the-box for evaluation (point the name
      at the ALB in the client's resolver / a private hosted zone).
    Default: "scanner.v1fs.internal"
  PMLEnabled:
    Type: String
    Description: Enable Predictive Machine Learning (PML) for file scanning. Requires PML support on the Vision One account.
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  NodeInstanceType:
    Type: String
    Description: >
      EC2 instance type for the managed node group. A single node group hosts
      both system components and scanner workloads; memory-optimized xlarge
      (4 vCPU / 32 GiB) fits four 800m/2Gi V1FS scanner pods per node.
      Graviton (r8g/r7g) types switch the node AMI to ARM64 and the
      scanner-app image build to linux/arm64 automatically.
    Default: r7i.xlarge
    AllowedValues:
      - r7i.xlarge
      - r7a.xlarge
      - r6i.xlarge
      - r7i.2xlarge
      - r8g.xlarge
      - r7g.xlarge
  MaxDecompressionLayer:
    Type: Number
    Description: >
      Maximum archive nesting depth the scanner will unpack (e.g., a zip inside a zip).
      Higher values catch deeply nested malware but increase scan time and memory usage.
      Range: 1-20. Default is unset (unlimited) in the scanner; we default to 10 for
      balanced protection against nested archive attacks without excessive resource use.
    Default: 10
    MinValue: 1
    MaxValue: 20
  MaxDecompressionFileCount:
    Type: Number
    Description: >
      Maximum number of files the scanner will extract from a single archive before
      stopping. Protects against archive bombs containing millions of tiny files that
      could exhaust memory or stall scanning. 0 means unlimited.
    Default: 1000
    MinValue: 0
  MaxDecompressionRatio:
    Type: Number
    Description: >
      Maximum allowed compression ratio (decompressed size / compressed size). A small
      file that decompresses to a massive payload is a classic zip bomb indicator. The
      scanner skips entries exceeding this ratio. Range: 100-2147483647. Default 150
      means a 1 MB compressed file is allowed to decompress to at most 150 MB.
    Default: 150
    MinValue: 100
    MaxValue: 2147483647
  MaxDecompressionSize:
    Type: Number
    Description: >
      Maximum total decompressed size in MB the scanner will process from a single
      archive. Caps total memory/disk consumed when unpacking large archives.
      Range: 0-2048. 0 means unlimited. Default 512 MB provides headroom for
      legitimate large archives while capping resource use.
    Default: 512
    MinValue: 0
    MaxValue: 2048
  MaxFileSizeMB:
    Type: Number
    Description: >
      Maximum file size in MB that the main scanner will download and scan. Files exceeding
      this limit are routed to the review bucket via server-side S3 copy (no download into
      pod memory), where the review scanner re-scans them with no size limit.
    Default: 500
    MinValue: 1
    MaxValue: 2048
  ScanTimeoutSeconds:
    Type: Number
    Description: >
      gRPC scan timeout in seconds. Also sets the SQS queue visibility timeout
      to match, ensuring messages stay invisible while scans are in progress.
    Default: 600
    MinValue: 60
    MaxValue: 3600
Rules:
  ReviewRequiresScannerApp:
    RuleCondition: !Equals [!Ref DeployReviewPipeline, "true"]
    Assertions:
      - Assert: !Equals [!Ref DeployScannerApp, "true"]
        AssertDescription: DeployReviewPipeline=true requires DeployScannerApp=true
  AlbRequiresCertAndDomain:
    # Fires only for explicit alb (auto -> NLB, which needs no cert/domain).
    RuleCondition: !Equals [!Ref ScannerEndpointMode, "alb"]
    Assertions:
      - Assert: !Or
          - !Not [!Equals [!Ref ACMCertificateArn, ""]]
          - !Equals [!Ref SelfSignedScannerCert, "true"]
        AssertDescription: ALB scanner endpoint requires either ACMCertificateArn or SelfSignedScannerCert=true
      - Assert: !Not [!Equals [!Ref ScannerDomain, ""]]
        AssertDescription: ALB scanner endpoint requires ScannerDomain
  ExistingVpcRequiresAllParts:
    RuleCondition: !Not [!Equals [!Ref ExistingVpcId, ""]]
    Assertions:
      - Assert: !Not [!Equals [!Ref ExistingVpcCidr, ""]]
        AssertDescription: ExistingVpcId requires ExistingVpcCidr
      - Assert: !Not [!Equals [!Ref ExistingPrivateSubnet1Id, ""]]
        AssertDescription: ExistingVpcId requires ExistingPrivateSubnet1Id
      - Assert: !Not [!Equals [!Ref ExistingPrivateSubnet2Id, ""]]
        AssertDescription: ExistingVpcId requires ExistingPrivateSubnet2Id
      - Assert: !Not [!Equals [!Ref ExistingBastionSubnetId, ""]]
        AssertDescription: ExistingVpcId requires ExistingBastionSubnetId

Conditions:
  HaveRegToken: !Not [!Equals [!Ref RegistrationToken, ""]]
  CreateNetwork: !Equals [!Ref ExistingVpcId, ""]
  ScannerAppEnabled: !Equals [!Ref DeployScannerApp, "true"]
  ReviewEnabled: !And
    - !Condition ScannerAppEnabled
    - !Equals [!Ref DeployReviewPipeline, "true"]
  CreateIngestBucket: !And
    - !Condition ScannerAppEnabled
    - !Equals [!Ref ExistingIngestBucket, ""]
  UseExistingBucket: !And
    - !Condition ScannerAppEnabled
    - !Not [!Equals [!Ref ExistingIngestBucket, ""]]
  # auto -> NLB for both full-auto and BYO (identical endpoint; also the pod
  # discovery registry for client-side dispatchers). alb is explicit opt-in.
  ExposeNLB: !Or
    - !Equals [!Ref ScannerEndpointMode, "nlb"]
    - !Equals [!Ref ScannerEndpointMode, "auto"]
  ExposeALB: !Equals [!Ref ScannerEndpointMode, "alb"]
  ExposeEndpoint: !Or
    - !Condition ExposeNLB
    - !Condition ExposeALB

Mappings:
  RegionMap:
    us-east-1:
      ami: ami-0e1bed4f06a3b463d
    us-east-2:
      ami: ami-0884d2865dbe9de4b
    us-west-2:
      ami: ami-0606dd43116f5ed57
  # Node CPU architecture per instance type: selects the node group AMI and
  # the scanner-app image build platform (TARGET_ARCH in bastion UserData)
  NodeArchMap:
    r7i.xlarge:
      amiType: AL2023_x86_64_STANDARD
      arch: amd64
    r7a.xlarge:
      amiType: AL2023_x86_64_STANDARD
      arch: amd64
    r6i.xlarge:
      amiType: AL2023_x86_64_STANDARD
      arch: amd64
    r7i.2xlarge:
      amiType: AL2023_x86_64_STANDARD
      arch: amd64
    r8g.xlarge:
      amiType: AL2023_ARM_64_STANDARD
      arch: arm64
    r7g.xlarge:
      amiType: AL2023_ARM_64_STANDARD
      arch: arm64

Resources:

  BaseVPC:
    Condition: CreateNetwork
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.2.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Sub BaseVPC-${AWS::StackName}

  VPCFlowLogRole:
    Condition: CreateNetwork
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/vpc/flowlogs/${AWS::StackName}
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/vpc/flowlogs/${AWS::StackName}:*

  VPCFlowLogGroup:
    Condition: CreateNetwork
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /vpc/flowlogs/${AWS::StackName}
      RetentionInDays: 90

  VPCFlowLog:
    Condition: CreateNetwork
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref BaseVPC
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref VPCFlowLogGroup
      DeliverLogsPermissionArn: !GetAtt VPCFlowLogRole.Arn

  IG:
    Condition: CreateNetwork
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub IG-${AWS::StackName}

  VPCIG:
    Condition: CreateNetwork
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref IG
      VpcId: !Ref BaseVPC

  PublicSubnet1:
    Condition: CreateNetwork
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.0.0/22
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref PrimaryAZ
      Tags:
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: Name
          Value: !Sub PublicSubnet1-${AWS::StackName}

  PublicSubnet2:
    Condition: CreateNetwork
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.4.0/22
      MapPublicIpOnLaunch: true
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref SecondaryAZ
      Tags:
        - Key: kubernetes.io/role/elb
          Value: "1"
        - Key: Name
          Value: !Sub PublicSubnet2-${AWS::StackName}

  PrivateSubnet1:
    Condition: CreateNetwork
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.32.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref PrimaryAZ
      Tags:
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: Name
          Value: !Sub PrivateSubnet1-${AWS::StackName}

  PrivateSubnet2:
    Condition: CreateNetwork
    Type: AWS::EC2::Subnet
    Properties:
      CidrBlock: 10.2.48.0/20
      MapPublicIpOnLaunch: false
      VpcId: !Ref BaseVPC
      AvailabilityZone: !Ref SecondaryAZ
      Tags:
        - Key: kubernetes.io/role/internal-elb
          Value: "1"
        - Key: Name
          Value: !Sub PrivateSubnet2-${AWS::StackName}

  NGWEIP1:
    Condition: CreateNetwork
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP1-${AWS::StackName}

  NGW1:
    Condition: CreateNetwork
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP1.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub NGW1-${AWS::StackName}

  NGWEIP2:
    Condition: CreateNetwork
    Type: AWS::EC2::EIP
    DependsOn: VPCIG
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub NGWEIP2-${AWS::StackName}

  NGW2:
    Condition: CreateNetwork
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NGWEIP2.AllocationId
      ConnectivityType: public
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub NGW2-${AWS::StackName}

  PublicRT1:
    Condition: CreateNetwork
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT1-${AWS::StackName}

  PublicRT2:
    Condition: CreateNetwork
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PublicRT2-${AWS::StackName}

  PrivateRT1:
    Condition: CreateNetwork
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT1-${AWS::StackName}

  PrivateRT2:
    Condition: CreateNetwork
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref BaseVPC
      Tags:
        - Key: Name
          Value: !Sub PrivateRT2-${AWS::StackName}

  PublicRoute1:
    Condition: CreateNetwork
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT1
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PublicRoute2:
    Condition: CreateNetwork
    DependsOn: VPCIG
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRT2
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IG

  PrivateRoute1:
    Condition: CreateNetwork
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW1

  PrivateRoute2:
    Condition: CreateNetwork
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRT2
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NGW2

  PublicSubnetRT1:
    Condition: CreateNetwork
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRT1
      SubnetId: !Ref PublicSubnet1

  PublicSubnetRT2:
    Condition: CreateNetwork
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRT2
      SubnetId: !Ref PublicSubnet2

  PrivateSubnetRT1:
    Condition: CreateNetwork
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRT1
      SubnetId: !Ref PrivateSubnet1

  PrivateSubnetRT2:
    Condition: CreateNetwork
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRT2
      SubnetId: !Ref PrivateSubnet2

  BastionSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !If [CreateNetwork, !Ref BaseVPC, !Ref ExistingVpcId]
      # No ingress rules on purpose: the bastion is reachable ONLY via SSM
      # Session Manager (no inbound ports required). Egress-only group.
      GroupDescription: Bastion host - no inbound access (SSM Session Manager only)
      Tags:
        - Key: Name
          Value: !Sub BastionSecGroup-${AWS::StackName}

  EKSSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !If [CreateNetwork, !Ref BaseVPC, !Ref ExistingVpcId]
      GroupDescription: EKS control plane - restricted ports only
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.2.32.0/20
          Description: HTTPS API from private subnet 1
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.2.48.0/20
          Description: HTTPS API from private subnet 2
        - IpProtocol: tcp
          FromPort: 6443
          ToPort: 6443
          CidrIp: 10.2.32.0/20
          Description: K8s API from private subnet 1
        - IpProtocol: tcp
          FromPort: 6443
          ToPort: 6443
          CidrIp: 10.2.48.0/20
          Description: K8s API from private subnet 2
        - IpProtocol: tcp
          FromPort: 9443
          ToPort: 9443
          CidrIp: 10.2.32.0/20
          Description: Webhooks from private subnet 1
        - IpProtocol: tcp
          FromPort: 9443
          ToPort: 9443
          CidrIp: 10.2.48.0/20
          Description: Webhooks from private subnet 2
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref BastionSecGroup
          Description: HTTPS API from bastion
        - IpProtocol: tcp
          FromPort: 6443
          ToPort: 6443
          SourceSecurityGroupId: !Ref BastionSecGroup
          Description: K8s API from bastion
      Tags:
        - Key: Name
          Value: !Sub EKSSecGroup-${AWS::StackName}

  NodeSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !If [CreateNetwork, !Ref BaseVPC, !Ref ExistingVpcId]
      GroupDescription: EKS worker nodes - restricted ports only
      Tags:
        - Key: Name
          Value: !Sub NodeSecGroup-${AWS::StackName}

  NodeSecGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecGroup
      IpProtocol: "-1"
      SourceSecurityGroupId: !Ref NodeSecGroup
      Description: Node-to-node (all protocols - pod networking, DNS, etc.)

  NodeSecGroupFromControlPlane:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecGroup
      IpProtocol: tcp
      FromPort: 1025
      ToPort: 65535
      SourceSecurityGroupId: !Ref EKSSecGroup
      Description: Control plane to node kubelet and workloads

  NodeSecGroupFromControlPlane443:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref EKSSecGroup
      Description: Control plane to node HTTPS (webhooks)

  NodeSecGroupBastionSSH:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      SourceSecurityGroupId: !Ref BastionSecGroup
      Description: SSH from bastion for debugging

  # Scanner endpoint exposure (NLB/ALB with ip-targets): allow VPC-internal
  # traffic to the scanner gRPC and ICAP ports on pod ENIs (node SG).
  # Proactive — the LB controller manages its own rules for some paths, but
  # ip-target registration can miss node SG rules in certain configurations.
  NodeSecGroupScannerGrpc:
    Condition: ExposeEndpoint
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecGroup
      IpProtocol: tcp
      FromPort: 50051
      ToPort: 50051
      CidrIp: !If [CreateNetwork, 10.2.0.0/16, !Ref ExistingVpcCidr]
      Description: VPC-internal gRPC to scanner pods (LB ip-targets)

  NodeSecGroupScannerIcap:
    Condition: ExposeEndpoint
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref NodeSecGroup
      IpProtocol: tcp
      FromPort: 1344
      ToPort: 1344
      CidrIp: !If [CreateNetwork, 10.2.0.0/16, !Ref ExistingVpcCidr]
      Description: VPC-internal ICAP to scanner pods (LB ip-targets)

  EKSSecGroupFromNodes:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EKSSecGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      SourceSecurityGroupId: !Ref NodeSecGroup
      Description: Nodes to control plane HTTPS

  EFSSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !If [CreateNetwork, !Ref BaseVPC, !Ref ExistingVpcId]
      GroupDescription: EFS mount targets - NFS access from EKS nodes
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref NodeSecGroup
          Description: NFS from EKS worker nodes
      Tags:
        - Key: Name
          Value: !Sub EFSSecGroup-${AWS::StackName}

  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub EKSClusterRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
      Tags:
        - Key: Name
          Value: !Sub EKSClusterRole-${AWS::StackName}

  NodeInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub EKSNodeRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: NodeCloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/eks/EKSCluster-${AWS::StackName}/*
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/containerinsights/EKSCluster-${AWS::StackName}/*
      Tags:
        - Key: Name
          Value: !Sub EKSNodeRole-${AWS::StackName}

  BastionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub BastionRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: BastionEKSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EKSAccess
                Effect: Allow
                Action:
                  - eks:DescribeCluster
                  - eks:ListClusters
                  - eks:AccessKubernetesApi
                Resource:
                  - !Sub arn:aws:eks:${AWS::Region}:${AWS::AccountId}:cluster/EKSCluster-${AWS::StackName}
              - Sid: ECRAuth
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                Resource: "*"
              - !If
                - ScannerAppEnabled
                - Sid: ECRRead
                  Effect: Allow
                  Action:
                    - ecr:BatchGetImage
                    - ecr:GetDownloadUrlForLayer
                    - ecr:BatchCheckLayerAvailability
                  Resource: !GetAtt ScannerAppECRRepo.Arn
                - !Ref AWS::NoValue
              - !If
                - ScannerAppEnabled
                - Sid: ECRPush
                  Effect: Allow
                  Action:
                    - ecr:InitiateLayerUpload
                    - ecr:UploadLayerPart
                    - ecr:CompleteLayerUpload
                    - ecr:PutImage
                  Resource: !GetAtt ScannerAppECRRepo.Arn
                - !Ref AWS::NoValue
              - Sid: STS
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: CFNAccess
                Effect: Allow
                Action:
                  - cloudformation:SignalResource
                  - cloudformation:DescribeStacks
                Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*
              - Sid: SecretsManagerRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !If
                  - HaveRegToken
                  - - !Ref V1FSRegistrationSecret
                    # ApiKey: SDK sanity scans + registration-token auto-fetch
                    - !Ref V1FSApiKeySecret
                  - - !Ref V1FSApiKeySecret
              # Publishes the scanner endpoint address for external evaluation apps
              - Sid: PublishScannerEndpoint
                Effect: Allow
                Action:
                  - ssm:PutParameter
                Resource:
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/scanner-endpoint
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/scanner-ca-cert
              - !If
                - ExposeALB
                # Self-signed ALB cert: import a freshly-generated cert into ACM
                # for the ingress listener. ImportCertificate targets a new ARN
                # so it cannot be resource-scoped; the LB controller reads it.
                - Sid: ImportSelfSignedScannerCert
                  Effect: Allow
                  Action:
                    - acm:ImportCertificate
                    - acm:AddTagsToCertificate
                  Resource: "*"
                - !Ref AWS::NoValue
              - !If
                - CreateIngestBucket
                - Sid: S3IngestWrite
                  Effect: Allow
                  Action:
                    - s3:PutObject
                    - s3:ListBucket
                  Resource:
                    - !GetAtt IngestBucket.Arn
                    - !Sub ${IngestBucket.Arn}/*
                - !Ref AWS::NoValue
      Tags:
        - Key: Name
          Value: !Sub BastionRole-${AWS::StackName}

  BastionInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref BastionRole

  EBSCSIDriverRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub EBSCSIDriverRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
      Tags:
        - Key: Name
          Value: !Sub EBSCSIDriverRole-${AWS::StackName}

  EFSCSIDriverRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub EFSCSIDriverRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: EFSCSIDriverPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: EFSAccess
                Effect: Allow
                Action:
                  - elasticfilesystem:DescribeAccessPoints
                  - elasticfilesystem:DescribeFileSystems
                  - elasticfilesystem:DescribeMountTargets
                  - elasticfilesystem:CreateAccessPoint
                  - elasticfilesystem:DeleteAccessPoint
                  - elasticfilesystem:TagResource
                Resource: !GetAtt EFSFileSystem.Arn
              - Sid: EC2Describe
                Effect: Allow
                Action:
                  - ec2:DescribeAvailabilityZones
                Resource: "*"
      Tags:
        - Key: Name
          Value: !Sub EFSCSIDriverRole-${AWS::StackName}

  LBControllerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub LBControllerRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: AWSLoadBalancerControllerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:AWSServiceName: elasticloadbalancing.amazonaws.com
              - Effect: Allow
                Action:
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeAddresses
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeInternetGateways
                  - ec2:DescribeVpcs
                  - ec2:DescribeVpcPeeringConnections
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeInstances
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeTags
                  - ec2:DescribeCoipPools
                  - ec2:GetCoipPoolUsage
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeLoadBalancerAttributes
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeListenerAttributes
                  - elasticloadbalancing:DescribeListenerCertificates
                  - elasticloadbalancing:DescribeSSLPolicies
                  - elasticloadbalancing:DescribeRules
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetGroupAttributes
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:DescribeTags
                  - elasticloadbalancing:DescribeTrustStores
                  - elasticloadbalancing:DescribeCapacityReservation
                Resource: "*"
              - Effect: Allow
                Action:
                  - cognito-idp:DescribeUserPoolClient
                  - acm:ListCertificates
                  - acm:DescribeCertificate
                  - iam:ListServerCertificates
                  - iam:GetServerCertificate
                  - waf-regional:GetWebACL
                  - waf-regional:GetWebACLForResource
                  - waf-regional:AssociateWebACL
                  - waf-regional:DisassociateWebACL
                  - wafv2:GetWebACL
                  - wafv2:GetWebACLForResource
                  - wafv2:AssociateWebACL
                  - wafv2:DisassociateWebACL
                  - shield:GetSubscriptionState
                  - shield:DescribeProtection
                  - shield:CreateProtection
                  - shield:DeleteProtection
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:CreateSecurityGroup
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:CreateTags
                Resource: arn:aws:ec2:*:*:security-group/*
                Condition:
                  StringEquals:
                    ec2:CreateAction: CreateSecurityGroup
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - ec2:CreateTags
                  - ec2:DeleteTags
                Resource: arn:aws:ec2:*:*:security-group/*
                Condition:
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "true"
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:DeleteSecurityGroup
                Resource: "*"
                Condition:
                  "Null":
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:CreateTargetGroup
                Resource: "*"
                Condition:
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:DeleteListener
                  - elasticloadbalancing:CreateRule
                  - elasticloadbalancing:DeleteRule
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:RemoveTags
                Resource:
                  - arn:aws:elasticloadbalancing:*:*:targetgroup/*/*
                  - arn:aws:elasticloadbalancing:*:*:loadbalancer/net/*/*
                  - arn:aws:elasticloadbalancing:*:*:loadbalancer/app/*/*
                Condition:
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "true"
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:RemoveTags
                Resource:
                  - arn:aws:elasticloadbalancing:*:*:listener/net/*/*/*
                  - arn:aws:elasticloadbalancing:*:*:listener/app/*/*/*
                  - arn:aws:elasticloadbalancing:*:*:listener-rule/net/*/*/*
                  - arn:aws:elasticloadbalancing:*:*:listener-rule/app/*/*/*
              # Tag-on-create: the controller creates LBs/target groups WITH
              # tags in the same call, which IAM evaluates as AddTags under a
              # CreateAction context. Required for the scanner NLB/ALB.
              - Effect: Allow
                Action:
                  - elasticloadbalancing:AddTags
                Resource:
                  - arn:aws:elasticloadbalancing:*:*:targetgroup/*/*
                  - arn:aws:elasticloadbalancing:*:*:loadbalancer/net/*/*
                  - arn:aws:elasticloadbalancing:*:*:loadbalancer/app/*/*
                Condition:
                  StringEquals:
                    elasticloadbalancing:CreateAction:
                      - CreateTargetGroup
                      - CreateLoadBalancer
                  "Null":
                    aws:RequestTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - elasticloadbalancing:SetIpAddressType
                  - elasticloadbalancing:SetSecurityGroups
                  - elasticloadbalancing:SetSubnets
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyTargetGroupAttributes
                  - elasticloadbalancing:DeleteTargetGroup
                  - elasticloadbalancing:ModifyListenerAttributes
                  - elasticloadbalancing:ModifyCapacityReservation
                Resource: "*"
                Condition:
                  "Null":
                    aws:ResourceTag/elbv2.k8s.aws/cluster: "false"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                Resource: arn:aws:elasticloadbalancing:*:*:targetgroup/*/*
              - Effect: Allow
                Action:
                  - elasticloadbalancing:SetWebAcl
                  - elasticloadbalancing:ModifyListener
                  - elasticloadbalancing:AddListenerCertificates
                  - elasticloadbalancing:RemoveListenerCertificates
                  - elasticloadbalancing:ModifyRule
                Resource: "*"
      Tags:
        - Key: Name
          Value: !Sub LBControllerRole-${AWS::StackName}

  EKSCluster:
    DependsOn:
      - EKSClusterRole
      - EKSSecGroup
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub EKSCluster-${AWS::StackName}
      RoleArn: !GetAtt EKSClusterRole.Arn
      AccessConfig:
        AuthenticationMode: API_AND_CONFIG_MAP
      ResourcesVpcConfig:
        SecurityGroupIds:
          - !Ref EKSSecGroup
        SubnetIds:
          - !If [CreateNetwork, !Ref PrivateSubnet1, !Ref ExistingPrivateSubnet1Id]
          - !If [CreateNetwork, !Ref PrivateSubnet2, !Ref ExistingPrivateSubnet2Id]
        EndpointPrivateAccess: true
        EndpointPublicAccess: false
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
            - Type: controllerManager
            - Type: scheduler
      Tags:
        - Key: Name
          Value: !Sub EKSCluster-${AWS::StackName}
        # Conditional implicit dependency: when this stack creates the network,
        # referencing the NAT gateways and private routes here makes the cluster
        # wait for them (DependsOn cannot be conditional). Inert in existing-VPC mode.
        - Key: network-ready
          # Referencing NAT gateways + private routes makes the cluster wait for
          # egress to exist (DependsOn can't be conditional). Ref of an
          # AWS::EC2::Route returns "<rtb-id>|<cidr>" — the '|' is an invalid tag
          # character, so take the route-table-id half via Split/Select. The
          # reference still registers the CloudFormation dependency.
          Value: !If
            - CreateNetwork
            - !Join
              - "-"
              - - !Ref NGW1
                - !Ref NGW2
                - !Select [0, !Split ["|", !Ref PrivateRoute1]]
                - !Select [0, !Split ["|", !Ref PrivateRoute2]]
            - existing-vpc

  BastionAccessEntry:
    DependsOn: EKSCluster
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      PrincipalArn: !GetAtt BastionRole.Arn
      Type: STANDARD
      AccessPolicies:
        - PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
          AccessScope:
            Type: cluster

  EKSLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub EKSLaunchTemplate-${AWS::StackName}
      LaunchTemplateData:
        MetadataOptions:
          HttpPutResponseHopLimit: 2
          HttpTokens: required
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 20
              VolumeType: gp3
              Encrypted: true
        SecurityGroupIds:
          - !Ref NodeSecGroup

  NodeGroup:
    DependsOn:
      - EKSCluster
      - NodeInstanceRole
      - EKSLaunchTemplate
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref EKSCluster
      LaunchTemplate:
        Id: !Ref EKSLaunchTemplate
        Version: !GetAtt EKSLaunchTemplate.LatestVersionNumber
      NodeRole: !GetAtt NodeInstanceRole.Arn
      Subnets:
        - !If [CreateNetwork, !Ref PrivateSubnet1, !Ref ExistingPrivateSubnet1Id]
        - !If [CreateNetwork, !Ref PrivateSubnet2, !Ref ExistingPrivateSubnet2Id]
      ScalingConfig:
        DesiredSize: !Ref NodeGroupDesiredSize
        MinSize: !Ref NodeGroupMinSize
        MaxSize: !Ref NodeGroupMaxSize
      InstanceTypes:
        - !Ref NodeInstanceType
      AmiType: !FindInMap [NodeArchMap, !Ref NodeInstanceType, amiType]

  CNIAddOn:
    DependsOn: EKSCluster
    Type: AWS::EKS::Addon
    Properties:
      AddonName: vpc-cni
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  PodIdentityAgentAddon:
    DependsOn: NodeGroup
    Type: AWS::EKS::Addon
    Properties:
      AddonName: eks-pod-identity-agent
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  CoreDNSAddon:
    DependsOn: NodeGroup
    Type: AWS::EKS::Addon
    Properties:
      AddonName: coredns
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  KubeProxyAddon:
    DependsOn: EKSCluster
    Type: AWS::EKS::Addon
    Properties:
      AddonName: kube-proxy
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  EBSCSIDriverAddon:
    DependsOn:
      - NodeGroup
      - EBSCSIDriverPodIdentity
    Type: AWS::EKS::Addon
    Properties:
      AddonName: aws-ebs-csi-driver
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  EBSCSIDriverPodIdentity:
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: kube-system
      ServiceAccount: ebs-csi-controller-sa
      RoleArn: !GetAtt EBSCSIDriverRole.Arn

  EFSCSIDriverAddon:
    DependsOn:
      - NodeGroup
      - EFSCSIDriverPodIdentity
    Type: AWS::EKS::Addon
    Properties:
      AddonName: aws-efs-csi-driver
      ClusterName: !Sub EKSCluster-${AWS::StackName}

  EFSCSIDriverPodIdentity:
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: kube-system
      ServiceAccount: efs-csi-controller-sa
      RoleArn: !GetAtt EFSCSIDriverRole.Arn

  LBControllerPodIdentity:
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: kube-system
      ServiceAccount: aws-load-balancer-controller
      RoleArn: !GetAtt LBControllerRole.Arn

  KedaOperatorRole:
    Condition: ScannerAppEnabled
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub KedaOperatorRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: KedaSQSMetrics
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: SQSQueueMetrics
                Effect: Allow
                Action:
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                Resource: !If
                  - ReviewEnabled
                  - - !GetAtt FileScanQueue.Arn
                    - !GetAtt ReviewScanQueue.Arn
                  - - !GetAtt FileScanQueue.Arn
      Tags:
        - Key: Name
          Value: !Sub KedaOperatorRole-${AWS::StackName}

  KedaOperatorPodIdentity:
    Condition: ScannerAppEnabled
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: keda
      ServiceAccount: keda-operator
      RoleArn: !GetAtt KedaOperatorRole.Arn

  # --- Cluster Autoscaler (Pod Identity) ---
  # The standard Kubernetes node autoscaler. EKS managed node groups
  # auto-tag their ASGs with k8s.io/cluster-autoscaler/enabled and
  # k8s.io/cluster-autoscaler/<cluster-name>, so auto-discovery works
  # without extra tagging resources.
  ClusterAutoscalerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ClusterAutoscalerRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: ClusterAutoscalerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadOnlyDiscovery
                Effect: Allow
                Action:
                  - autoscaling:DescribeAutoScalingGroups
                  - autoscaling:DescribeAutoScalingInstances
                  - autoscaling:DescribeLaunchConfigurations
                  - autoscaling:DescribeScalingActivities
                  - autoscaling:DescribeTags
                  - ec2:DescribeImages
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeLaunchTemplateVersions
                  - ec2:GetInstanceTypesFromInstanceRequirements
                  - eks:DescribeNodegroup
                Resource: "*"
              - Sid: ScaleManagedNodeGroupASGs
                Effect: Allow
                Action:
                  - autoscaling:SetDesiredCapacity
                  - autoscaling:TerminateInstanceInAutoScalingGroup
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/k8s.io/cluster-autoscaler/enabled: "true"
      Tags:
        - Key: Name
          Value: !Sub ClusterAutoscalerRole-${AWS::StackName}

  ClusterAutoscalerPodIdentity:
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: kube-system
      ServiceAccount: cluster-autoscaler
      RoleArn: !GetAtt ClusterAutoscalerRole.Arn

  # --- Pre-Delete Cleanup (Lambda) ---
  # Ensures orphaned EBS volumes (V1FS PVCs) and LB-controller-created
  # load balancers / target groups / security groups are cleaned up before
  # CloudFormation deletes the EKS cluster and VPC. Without this, stack
  # deletion fails because orphaned resources still reference the VPC.

  CleanupLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub CleanupLambdaRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CleanupPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeVolumes
                  - ec2:DeleteVolume
                  - ec2:DescribeSecurityGroups
                  - ec2:DeleteSecurityGroup
                  - ec2:RevokeSecurityGroupIngress
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTags
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:DeleteTargetGroup
                  - logs:DescribeLogGroups
                  # Delete the self-signed scanner cert the bastion imported (ALB mode)
                  - acm:ListCertificates
                  - acm:ListTagsForCertificate
                  - acm:DeleteCertificate
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:DeleteLogGroup
                Resource:
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/eks/EKSCluster-${AWS::StackName}*
                  - !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*${AWS::StackName}*

  CleanupLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub cleanup-${AWS::StackName}
      Runtime: python3.12
      Timeout: 300
      Handler: index.handler
      Role: !GetAtt CleanupLambdaRole.Arn
      Environment:
        Variables:
          CLUSTER_NAME: !Sub EKSCluster-${AWS::StackName}
          STACK_NAME: !Ref AWS::StackName
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import os
          import time

          def handler(event, context):
              if event['RequestType'] != 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return

              cluster_name = os.environ['CLUSTER_NAME']
              stack_name = os.environ['STACK_NAME']
              ec2 = boto3.client('ec2')
              elbv2 = boto3.client('elbv2')
              logs = boto3.client('logs')
              acm = boto3.client('acm')

              try:
                  # 1. Delete LB-controller-created load balancers (scanner NLB/ALB).
                  # These are created by the AWS LB Controller, not CloudFormation,
                  # and would otherwise orphan and block VPC deletion.
                  print(f"Finding load balancers for {cluster_name}...")
                  lb_arns = []
                  paginator = elbv2.get_paginator('describe_load_balancers')
                  for page in paginator.paginate():
                      arns = [lb['LoadBalancerArn'] for lb in page['LoadBalancers']]
                      if not arns:
                          continue
                      tags = elbv2.describe_tags(ResourceArns=arns)
                      for td in tags['TagDescriptions']:
                          for t in td['Tags']:
                              if t['Key'] == 'elbv2.k8s.aws/cluster' and t['Value'] == cluster_name:
                                  lb_arns.append(td['ResourceArn'])
                  for arn in lb_arns:
                      print(f"Deleting load balancer: {arn}")
                      elbv2.delete_load_balancer(LoadBalancerArn=arn)
                  if lb_arns:
                      time.sleep(30)  # allow ENI release before SG/VPC deletion

                  # 1b. Delete the self-signed scanner cert the bastion imported
                  # to ACM (ALB mode). Only deletable once the ALB listener is
                  # gone (deleted above); retry while ACM releases the in-use
                  # association. Discovered by the Name tag the bastion sets.
                  print("Checking for imported self-signed scanner certs...")
                  cert_tag = f"scanner-selfsigned-{stack_name}"
                  cert_paginator = acm.get_paginator('list_certificates')
                  for page in cert_paginator.paginate():
                      for cert in page['CertificateSummaryList']:
                          arn = cert['CertificateArn']
                          try:
                              tags = acm.list_tags_for_certificate(CertificateArn=arn)['Tags']
                          except Exception:
                              continue
                          if not any(t['Key'] == 'Name' and t.get('Value') == cert_tag for t in tags):
                              continue
                          for attempt in range(5):
                              try:
                                  acm.delete_certificate(CertificateArn=arn)
                                  print(f"Deleted ACM cert: {arn}")
                                  break
                              except Exception as c_err:
                                  if attempt == 4:
                                      print(f"ACM cert delete failed after retries (non-fatal): {c_err}")
                                  else:
                                      time.sleep(15)

                  # 2. Delete LB-controller-created target groups
                  print("Checking for orphaned target groups...")
                  paginator = elbv2.get_paginator('describe_target_groups')
                  for page in paginator.paginate():
                      arns = [tg['TargetGroupArn'] for tg in page['TargetGroups']]
                      if not arns:
                          continue
                      tags = elbv2.describe_tags(ResourceArns=arns)
                      for td in tags['TagDescriptions']:
                          for t in td['Tags']:
                              if t['Key'] == 'elbv2.k8s.aws/cluster' and t['Value'] == cluster_name:
                                  print(f"Deleting target group: {td['ResourceArn']}")
                                  try:
                                      elbv2.delete_target_group(TargetGroupArn=td['ResourceArn'])
                                  except Exception as tg_err:
                                      print(f"Target group delete failed (non-fatal): {tg_err}")

                  # 3. Delete LB-controller-created security groups.
                  # The controller's shared backend SG is referenced by rules it
                  # added to other SGs (e.g. the node SG) — revoke those
                  # references first, then retry the delete while ENIs release.
                  print("Checking for orphaned LB security groups...")
                  sgs = ec2.describe_security_groups(
                      Filters=[{'Name': 'tag:elbv2.k8s.aws/cluster', 'Values': [cluster_name]}]
                  )
                  for sg in sgs['SecurityGroups']:
                      sg_id = sg['GroupId']
                      # Revoke rules in OTHER security groups that reference this one
                      try:
                          refs = ec2.describe_security_groups(
                              Filters=[{'Name': 'ip-permission.group-id', 'Values': [sg_id]}]
                          )
                          for ref in refs['SecurityGroups']:
                              perms = [p for p in ref['IpPermissions']
                                       if any(g.get('GroupId') == sg_id for g in p.get('UserIdGroupPairs', []))]
                              if perms:
                                  print(f"Revoking rules referencing {sg_id} from {ref['GroupId']}")
                                  ec2.revoke_security_group_ingress(GroupId=ref['GroupId'], IpPermissions=perms)
                      except Exception as ref_err:
                          print(f"Reference revocation failed (non-fatal): {ref_err}")
                      # Retry delete — ENI release after LB deletion takes time
                      for attempt in range(5):
                          try:
                              ec2.delete_security_group(GroupId=sg_id)
                              print(f"Deleted security group: {sg_id}")
                              break
                          except Exception as sg_err:
                              if attempt == 4:
                                  print(f"Security group delete failed after retries (non-fatal): {sg_err}")
                              else:
                                  time.sleep(20)

                  # 4. Delete orphaned EBS volumes (from V1FS PVCs).
                  # Volumes only become 'available' once their node terminates,
                  # which can lag this handler — poll a few bounded rounds so
                  # volumes that detach shortly after we start are still caught.
                  # Bounded well under the 300s Lambda timeout.
                  print("Checking for orphaned EBS volumes...")
                  vol_filters = [
                      {'Name': 'status', 'Values': ['available']},
                      {'Name': f'tag:kubernetes.io/cluster/{cluster_name}', 'Values': ['owned']},
                  ]
                  deleted_vols = set()
                  for round_no in range(4):
                      vols = ec2.describe_volumes(Filters=vol_filters)['Volumes']
                      fresh = [v for v in vols if v['VolumeId'] not in deleted_vols]
                      for vol in fresh:
                          print(f"Deleting orphaned volume: {vol['VolumeId']}")
                          try:
                              ec2.delete_volume(VolumeId=vol['VolumeId'])
                              deleted_vols.add(vol['VolumeId'])
                          except Exception as v_err:
                              print(f"Volume delete failed (non-fatal): {v_err}")
                      if round_no < 3:
                          time.sleep(20)  # let more volumes finish detaching

                  # 5. Delete service-created CloudWatch log groups that
                  # CloudFormation doesn't own (EKS control plane, Lambda exec
                  # logs). Skip this function's OWN group — it's still in use.
                  print("Checking for orphaned log groups...")
                  own_group = f"/aws/lambda/cleanup-{stack_name}"
                  prefixes = [
                      f"/aws/eks/{cluster_name}/",
                      "/aws/lambda/",
                  ]
                  for prefix in prefixes:
                      paginator = logs.get_paginator('describe_log_groups')
                      for page in paginator.paginate(logGroupNamePrefix=prefix):
                          for lg in page['logGroups']:
                              name = lg['logGroupName']
                              if name == own_group:
                                  continue
                              # only groups belonging to THIS stack
                              if stack_name not in name and cluster_name not in name:
                                  continue
                              print(f"Deleting log group: {name}")
                              try:
                                  logs.delete_log_group(logGroupName=name)
                              except Exception as lg_err:
                                  print(f"Log group delete failed (non-fatal): {lg_err}")

                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f"Cleanup error (non-fatal): {e}")
                  # Always succeed — don't block stack deletion
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

  CleanupTrigger:
    # DependsOn controls DELETE ordering (reverse of creation order).
    # By depending on NodeInstanceRole, CloudFormation deletes this resource
    # (running the cleanup Lambda) BEFORE tearing down node/VPC resources.
    DependsOn:
      - NodeInstanceRole
    Type: Custom::CleanupTrigger
    Properties:
      ServiceToken: !GetAtt CleanupLambda.Arn

  V1FSRegistrationSecret:
    # Created only when a token is provided explicitly. When absent, the
    # bastion mints one at deploy time via the Vision One API using ApiKey.
    Condition: HaveRegToken
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}/v1fs-registration-token
      Description: Vision One File Security registration token
      SecretString: !Ref RegistrationToken
      Tags:
        - Key: Name
          Value: !Sub V1FSRegistrationToken-${AWS::StackName}

  V1FSApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}/v1fs-api-key
      Description: Vision One API key for SDK file scanning
      SecretString: !Ref ApiKey
      Tags:
        - Key: Name
          Value: !Sub V1FSApiKey-${AWS::StackName}

  BastionKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: !Sub BastionKey-${AWS::StackName}
      Tags:
        - Key: Name
          Value: !Sub BastionKey-${AWS::StackName}

  Bastion:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT30M
        Count: 1
    DependsOn:
      - LBControllerPodIdentity
      - EBSCSIDriverAddon
      - EFSCSIDriverAddon
      - EFSMountTarget1
      - EFSMountTarget2
    Properties:
      IamInstanceProfile: !Ref BastionInstanceProfile
      ImageId: !FindInMap
        - RegionMap
        - !Ref AWS::Region
        - ami
      InstanceType: t3.medium
      NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !If [CreateNetwork, !Ref PublicSubnet1, !Ref ExistingBastionSubnetId]
          GroupSet:
            - !Ref BastionSecGroup
          # Public IP only in the created network; in an existing VPC the
          # bastion may sit in a private subnet (SSM-only, egress via your NAT)
          AssociatePublicIpAddress: !If [CreateNetwork, true, false]
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 20
            VolumeType: gp3
            Encrypted: true
      KeyName: !Ref BastionKeyPair
      AvailabilityZone: !If [CreateNetwork, !Ref PrimaryAZ, !Ref AWS::NoValue]
      UserData: !Base64
        Fn::Sub:
          - |
            #!/bin/bash -x
            # ------------------------------------------------------------------
            # Bastion provisioning: export CFN-derived environment, clone the
            # repo, and run scripts/bootstrap.sh (all provisioning logic lives
            # there). Signals CloudFormation on exit, success or failure.
            # ------------------------------------------------------------------
            SIGNAL_STATUS="FAILURE"

            signal_cfn() {
              AWS_CMD=$(command -v aws || echo "/usr/bin/aws")
              $AWS_CMD cloudformation signal-resource \
                --stack-name "${AWS::StackName}" \
                --logical-resource-id Bastion \
                --unique-id "$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || echo bastion)" \
                --status "$SIGNAL_STATUS" \
                --region "${AWS::Region}" || true
            }
            trap signal_cfn EXIT

            # Exit on first error — the trap will signal FAILURE.
            set -e
            export DEBIAN_FRONTEND=noninteractive
            export HOME=/root

            # ---- Core identifiers ----
            export CFN_STACK_NAME="${AWS::StackName}"
            export AWS_REGION="${AWS::Region}"
            export CLUSTER_NAME="EKSCluster-${AWS::StackName}"
            export VPC_ID="${VpcIdValue}"
            export EFS_ID="${EFSFileSystem}"
            export V1FS_REGISTRATION_SECRET="${RegistrationSecretValue}"
            export V1FS_API_KEY_SECRET_ARN="${V1FSApiKeySecret}"
            export V1_API_ENDPOINT="${VisionOneApiEndpoint}"

            # ---- Deployment modes ----
            export DEPLOY_SCANNER_APP="${DeployScannerApp}"
            export DEPLOY_REVIEW="${DeployReviewPipeline}"
            export ENDPOINT_MODE="${ScannerEndpointMode}"
            export ACM_CERT_ARN="${ACMCertificateArn}"
            export SELF_SIGNED_CERT="${SelfSignedScannerCert}"
            export SCANNER_DOMAIN="${ScannerDomain}"
            export EXISTING_INGEST_BUCKET="${ExistingIngestBucket}"

            # ---- Scaling ----
            export SCANNER_MIN_REPLICAS="${ScannerMinReplicas}"
            export SCANNER_MAX_REPLICAS="${ScannerMaxReplicas}"
            export SCANNER_APP_MAX_REPLICAS="${ScannerAppMaxReplicas}"

            # ---- Scan policy ----
            export MAX_DECOMPRESSION_LAYER="${MaxDecompressionLayer}"
            export MAX_DECOMPRESSION_FILE_COUNT="${MaxDecompressionFileCount}"
            export MAX_DECOMPRESSION_RATIO="${MaxDecompressionRatio}"
            export MAX_DECOMPRESSION_SIZE="${MaxDecompressionSize}"
            export PML_ENABLED="${PMLEnabled}"
            export MAX_FILE_SIZE_MB="${MaxFileSizeMB}"
            export TM_AM_SCAN_TIMEOUT_SECS="${ScanTimeoutSeconds}"

            # ---- Scanner-app resources (empty when module disabled) ----
            # Passed directly — stack Outputs are unavailable during CREATE_IN_PROGRESS
            export TARGET_ARCH="${NodeArchValue}"
            export ECR_REPO_URL="${EcrRepoUrlValue}"
            export SQS_QUEUE_URL="${FileScanQueueValue}"
            export S3_INGEST_BUCKET="${IngestBucketValue}"
            export S3_CLEAN_BUCKET="${CleanBucketValue}"
            export S3_QUARANTINE_BUCKET="${QuarantineBucketValue}"
            export S3_REVIEW_BUCKET="${ReviewBucketValue}"
            export AUDIT_LOG_GROUP="${AuditLogGroupValue}"
            export REVIEW_SQS_QUEUE_URL="${ReviewQueueValue}"
            export REVIEW_AUDIT_LOG_GROUP="${ReviewAuditLogGroupValue}"

            # ---- Clone repo (pinned ref) and hand off to bootstrap ----
            # Pinning to ${RepoRef} keeps the cloned scripts/manifests/values in
            # lockstep with this template version — no drift against main.
            apt-get update -y
            apt-get install -y git
            git clone --depth 1 --branch "${RepoRef}" \
              https://github.com/arcaniusdev/eks-v1fs.git /opt/eks-v1fs
            chmod +x /opt/eks-v1fs/scripts/*.sh

            /opt/eks-v1fs/scripts/bootstrap.sh

            # If we reach here, everything succeeded
            SIGNAL_STATUS="SUCCESS"
            echo "Bastion provisioning complete."
          - RegistrationSecretValue: !If [HaveRegToken, !Ref V1FSRegistrationSecret, ""]
            NodeArchValue: !FindInMap [NodeArchMap, !Ref NodeInstanceType, arch]
            VpcIdValue: !If [CreateNetwork, !Ref BaseVPC, !Ref ExistingVpcId]
            EcrRepoUrlValue: !If [ScannerAppEnabled, !GetAtt ScannerAppECRRepo.RepositoryUri, ""]
            FileScanQueueValue: !If [ScannerAppEnabled, !Ref FileScanQueue, ""]
            IngestBucketValue: !If
              - ScannerAppEnabled
              - !If [CreateIngestBucket, !Ref IngestBucket, !Ref ExistingIngestBucket]
              - ""
            CleanBucketValue: !If [ScannerAppEnabled, !Ref CleanBucket, ""]
            QuarantineBucketValue: !If [ScannerAppEnabled, !Ref QuarantineBucket, ""]
            ReviewBucketValue: !If [ReviewEnabled, !Ref ReviewBucket, ""]
            AuditLogGroupValue: !If [ScannerAppEnabled, !Sub "scan-audit-${AWS::StackName}", ""]
            ReviewQueueValue: !If [ReviewEnabled, !Ref ReviewScanQueue, ""]
            ReviewAuditLogGroupValue: !If [ReviewEnabled, !Sub "review-audit-${AWS::StackName}", ""]
      Tags:
        - Key: Name
          Value: !Sub Bastion-${AWS::StackName}

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: elastic
      FileSystemTags:
        - Key: Name
          Value: !Sub EFS-${AWS::StackName}

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !If [CreateNetwork, !Ref PrivateSubnet1, !Ref ExistingPrivateSubnet1Id]
      SecurityGroups:
        - !Ref EFSSecGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !If [CreateNetwork, !Ref PrivateSubnet2, !Ref ExistingPrivateSubnet2Id]
      SecurityGroups:
        - !Ref EFSSecGroup

  ScannerAppECRRepo:
    Condition: ScannerAppEnabled
    Type: AWS::ECR::Repository
    Properties:
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      ImageTagMutability: IMMUTABLE
      EmptyOnDelete: true
      Tags:
        - Key: Name
          Value: !Sub ScannerAppECR-${AWS::StackName}

  IngestBucket:
    Condition: CreateIngestBucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn: SQSQueuePolicy
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireUnprocessedFiles
            Status: Enabled
            ExpirationInDays: 7
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt FileScanQueue.Arn
      Tags:
        - Key: Name
          Value: !Sub IngestBucket-${AWS::StackName}
        - Key: Purpose
          Value: file-scan-ingest

  CleanBucket:
    Condition: ScannerAppEnabled
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub CleanBucket-${AWS::StackName}
        - Key: Purpose
          Value: file-scan-clean

  QuarantineBucket:
    Condition: ScannerAppEnabled
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Sub QuarantineBucket-${AWS::StackName}
        - Key: Purpose
          Value: file-scan-quarantine

  ReviewScanDLQ:
    Condition: ReviewEnabled
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub review-scan-dlq-${AWS::StackName}
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Name
          Value: !Sub ReviewScanDLQ-${AWS::StackName}

  ReviewScanQueue:
    Condition: ReviewEnabled
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub review-scan-queue-${AWS::StackName}
      VisibilityTimeout: !Ref ScanTimeoutSeconds
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 20
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ReviewScanDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Name
          Value: !Sub ReviewScanQueue-${AWS::StackName}

  ReviewSQSQueuePolicy:
    Condition: ReviewEnabled
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref ReviewScanQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3Notification
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt ReviewScanQueue.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  ReviewBucket:
    Condition: ReviewEnabled
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    DependsOn: ReviewSQSQueuePolicy
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt ReviewScanQueue.Arn
      Tags:
        - Key: Name
          Value: !Sub ReviewBucket-${AWS::StackName}
        - Key: Purpose
          Value: file-scan-review

  # TLS-only bucket policies (CIS S3 best practice): deny any request not
  # made over HTTPS. Defense-in-depth on top of encryption + public-access-block.
  IngestBucketTLSPolicy:
    Condition: CreateIngestBucket
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref IngestBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt IngestBucket.Arn
              - !Sub ${IngestBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: "false"

  CleanBucketTLSPolicy:
    Condition: ScannerAppEnabled
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CleanBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt CleanBucket.Arn
              - !Sub ${CleanBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: "false"

  QuarantineBucketTLSPolicy:
    Condition: ScannerAppEnabled
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref QuarantineBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt QuarantineBucket.Arn
              - !Sub ${QuarantineBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: "false"

  ReviewBucketTLSPolicy:
    Condition: ReviewEnabled
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReviewBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt ReviewBucket.Arn
              - !Sub ${ReviewBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: "false"

  FileScanDLQ:
    Condition: ScannerAppEnabled
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub file-scan-dlq-${AWS::StackName}
      VisibilityTimeout: 120
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Name
          Value: !Sub FileScanDLQ-${AWS::StackName}

  FileScanQueue:
    Condition: ScannerAppEnabled
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub file-scan-queue-${AWS::StackName}
      VisibilityTimeout: !Ref ScanTimeoutSeconds
      MessageRetentionPeriod: 345600
      ReceiveMessageWaitTimeSeconds: 20
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt FileScanDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Name
          Value: !Sub FileScanQueue-${AWS::StackName}

  SQSQueuePolicy:
    Condition: ScannerAppEnabled
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref FileScanQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3Notification
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt FileScanQueue.Arn
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
          - !If
            - UseExistingBucket
            - Sid: AllowEventBridgeDelivery
              Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action: sqs:SendMessage
              Resource: !GetAtt FileScanQueue.Arn
              Condition:
                ArnEquals:
                  aws:SourceArn: !GetAtt EventBridgeIngestRule.Arn
                StringEquals:
                  # Defense-in-depth against a cross-account confused-deputy:
                  # only our own account's EventBridge rule may deliver here.
                  aws:SourceAccount: !Ref AWS::AccountId
            - !Ref AWS::NoValue

  # --- Existing-bucket wiring (S3 -> EventBridge -> SQS) ---
  # For user-owned buckets we must not touch their notification
  # configuration destructively: put-bucket-notification-configuration is a
  # full-replace API. A merge Lambda reads the current configuration, adds
  # EventBridgeConfiguration alongside whatever exists, and writes the merged
  # document back. On stack Delete it is a NO-OP — we never mutate the
  # user's bucket on teardown.
  EventBridgeIngestRule:
    Condition: UseExistingBucket
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ingest-object-created-${AWS::StackName}
      Description: Route Object Created events from the existing ingest bucket to the scan queue
      State: ENABLED
      EventPattern:
        source:
          - aws.s3
        detail-type:
          - Object Created
        detail:
          bucket:
            name:
              - !Ref ExistingIngestBucket
      Targets:
        - Id: FileScanQueueTarget
          Arn: !GetAtt FileScanQueue.Arn

  EnableEventBridgeRole:
    Condition: UseExistingBucket
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub EnableEventBridgeRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: MergeBucketNotification
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetBucketNotification
                  - s3:PutBucketNotification
                Resource: !Sub arn:aws:s3:::${ExistingIngestBucket}

  EnableEventBridgeFunction:
    Condition: UseExistingBucket
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub enable-eventbridge-${AWS::StackName}
      Runtime: python3.12
      Timeout: 60
      Handler: index.handler
      Role: !GetAtt EnableEventBridgeRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
              # Delete is a no-op: never mutate the user's bucket on
              # teardown — other consumers may rely on EventBridge by then.
              if event['RequestType'] == 'Delete':
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                  return
              try:
                  bucket = event['ResourceProperties']['BucketName']
                  s3 = boto3.client('s3')
                  config = s3.get_bucket_notification_configuration(Bucket=bucket)
                  config.pop('ResponseMetadata', None)
                  if 'EventBridgeConfiguration' in config:
                      print(f"EventBridge already enabled on {bucket}")
                  else:
                      # MERGE: preserve every existing Queue/Topic/Lambda
                      # configuration and add EventBridge alongside them.
                      config['EventBridgeConfiguration'] = {}
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket,
                          NotificationConfiguration=config,
                      )
                      print(f"EventBridge enabled on {bucket} (merged with existing config)")
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              except Exception as e:
                  print(f"Failed to enable EventBridge: {e}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  EnableBucketEventBridge:
    Condition: UseExistingBucket
    Type: Custom::EnableBucketEventBridge
    Properties:
      ServiceToken: !GetAtt EnableEventBridgeFunction.Arn
      BucketName: !Ref ExistingIngestBucket

  ScannerAppRole:
    Condition: ScannerAppEnabled
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ScannerAppRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action:
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: ScannerAppPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: SQSPoll
                Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                  # SendMessage: reconciliation re-queues orphaned files when
                  # the review pipeline (which otherwise runs it) is disabled
                  - sqs:SendMessage
                Resource: !GetAtt FileScanQueue.Arn
              # Created-bucket mode: read + delete after routing.
              # Existing-user-bucket mode: read + tag verdicts, NEVER delete.
              - !If
                - CreateIngestBucket
                - Sid: S3IngestRead
                  Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:DeleteObject
                  Resource: !Sub ${IngestBucket.Arn}/*
                - Sid: S3ExistingIngestRead
                  Effect: Allow
                  Action:
                    - s3:GetObject
                    - s3:PutObjectTagging
                  Resource: !Sub arn:aws:s3:::${ExistingIngestBucket}/*
              - Sid: S3IngestList
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !If
                  - CreateIngestBucket
                  - !GetAtt IngestBucket.Arn
                  - !Sub arn:aws:s3:::${ExistingIngestBucket}
              - Sid: S3CleanWrite
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectTagging
                Resource: !Sub ${CleanBucket.Arn}/*
              - Sid: S3QuarantineWrite
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectTagging
                Resource: !Sub ${QuarantineBucket.Arn}/*
              - !If
                - ReviewEnabled
                - Sid: S3ReviewWrite
                  Effect: Allow
                  Action:
                    - s3:PutObject
                    - s3:PutObjectTagging
                  Resource: !Sub ${ReviewBucket.Arn}/*
                - !Ref AWS::NoValue
              - Sid: SecretsManagerApiKey
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref V1FSApiKeySecret
              - Sid: CloudWatchAuditLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt ScanAuditLogGroup.Arn
      Tags:
        - Key: Name
          Value: !Sub ScannerAppRole-${AWS::StackName}

  ScannerAppPodIdentity:
    Condition: ScannerAppEnabled
    DependsOn: PodIdentityAgentAddon
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName: !Sub EKSCluster-${AWS::StackName}
      Namespace: visionone-filesecurity
      ServiceAccount: scanner-app
      RoleArn: !GetAtt ScannerAppRole.Arn

  # --- Monitoring & Observability ---

  ScanAuditLogGroup:
    Condition: ScannerAppEnabled
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub scan-audit-${AWS::StackName}
      RetentionInDays: 30
      Tags:
        - Key: Name
          Value: !Sub ScanAuditLogGroup-${AWS::StackName}

  AlarmSNSTopic:
    Condition: ScannerAppEnabled
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub scan-alarms-${AWS::StackName}
      Tags:
        - Key: Name
          Value: !Sub AlarmSNSTopic-${AWS::StackName}

  DLQAlarm:
    Condition: ScannerAppEnabled
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub DLQ-Messages-${AWS::StackName}
      AlarmDescription: Messages in the dead-letter queue indicate scan failures after 3 retries
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt FileScanDLQ.QueueName
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

  QueueAgeAlarm:
    Condition: ScannerAppEnabled
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub Queue-Age-${AWS::StackName}
      AlarmDescription: Oldest message age exceeds 20 minutes for 5 consecutive minutes — scanners may be stuck or unable to keep up
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
        - Name: QueueName
          Value: !GetAtt FileScanQueue.QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 5
      Threshold: 1200
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmSNSTopic
      OKActions:
        - !Ref AlarmSNSTopic

  # --- DLQ Remediation ---

  DLQRemediationRole:
    Condition: ScannerAppEnabled
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub DLQRemediationRole-${AWS::StackName}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DLQRemediationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DLQRead
                Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt FileScanDLQ.Arn
              - Sid: MainQueueWrite
                Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt FileScanQueue.Arn

  DLQRemediationLambda:
    Condition: ScannerAppEnabled
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub dlq-remediation-${AWS::StackName}
      Runtime: python3.12
      Timeout: 60
      Handler: index.handler
      Role: !GetAtt DLQRemediationRole.Arn
      Environment:
        Variables:
          QUEUE_URL: !Ref FileScanQueue
          MAX_DLQ_RETRIES: "3"
      Code:
        ZipFile: |
          import boto3
          import json
          import os

          sqs = boto3.client('sqs')
          QUEUE_URL = os.environ['QUEUE_URL']
          MAX_RETRIES = int(os.environ.get('MAX_DLQ_RETRIES', '3'))

          def handler(event, context):
              for record in event['Records']:
                  msg_id = record['messageId']
                  body = record['body']
                  attrs = record.get('messageAttributes', {})

                  retry = int(attrs.get('DLQRetryCount', {}).get('stringValue', '0'))

                  if retry >= MAX_RETRIES:
                      print(f"PERMANENT_FAILURE: message {msg_id} exceeded {MAX_RETRIES} DLQ retries, discarding")
                      try:
                          parsed = json.loads(body)
                          for r in parsed.get('Records', []):
                              s3info = r.get('s3', {})
                              print(f"  file: s3://{s3info.get('bucket',{}).get('name','?')}/{s3info.get('object',{}).get('key','?')}")
                      except Exception:
                          pass
                      continue

                  retry += 1
                  delay = min(60 * (5 ** (retry - 1)), 900)
                  print(f"RE-QUEUE: message {msg_id} DLQ retry {retry}/{MAX_RETRIES} delay={delay}s")

                  try:
                      sqs.send_message(
                          QueueUrl=QUEUE_URL,
                          MessageBody=body,
                          DelaySeconds=delay,
                          MessageAttributes={
                              'DLQRetryCount': {
                                  'DataType': 'Number',
                                  'StringValue': str(retry),
                              }
                          },
                      )
                  except Exception as e:
                      print(f"ERROR: Failed to re-queue message {msg_id}: {e}")

  DLQEventSourceMapping:
    Condition: ScannerAppEnabled
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt FileScanDLQ.Arn
      FunctionName: !Ref DLQRemediationLambda
      BatchSize: 10
      Enabled: true

